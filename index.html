<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    
    <link rel="preconnect" href="https://www.google.com">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 0px; }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
        }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        .viewport { padding-top: 70px; height: 100vh; width: 100%; overflow: hidden; }
        .section { display: none; height: calc(100vh - 70px); animation: fadeIn 0.4s ease forwards; position: relative; }
        .section.active { display: block; }

        .page-header { text-align: center; padding-top: 100px; margin-bottom: 60px; width: 100%; }
        .page-header h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .page-header p { color: var(--subtext); margin-top: 12px; font-weight: 600; font-size: 16px; opacity: 0.8; }

        #proxy-frame, #sound-frame, #game-frame { width: 100%; height: 100%; border: none; background: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; padding: 0 60px; }
        .game-card { background: var(--card); border-radius: 18px; padding: 12px; text-align: center; transition: var(--transition); cursor: pointer; }
        .game-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; }
        .game-card span { font-size: 14px; font-weight: 600; color: var(--subtext); }

        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; display: none; }
        #player.active { display: block; }
        .player-bar { height: 70px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--secondary); }

        #landing { height: 100vh; width: 100vw; display: flex; background: #0b0b0b; position: fixed; z-index: 9999; }
        #secret-input { background: transparent; border: none; color: var(--subtext); opacity: 0.3; font-size: 14px; width: 80px; -webkit-text-security: disc; margin-left: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="landing">
        <input type="text" id="secret-input" placeholder="code" onkeydown="if(event.key==='Enter') checkCode()">
        <button id="secret-btn" style="display:none;" onclick="transfer()">Open Cloaked</button>
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active" onclick="tab('home', this)">home</button>
            <button class="nav-btn" onclick="tab('games', this)">games</button>
            <button class="nav-btn" onclick="tab('proxy', this)">proxy</button>
            <button class="nav-btn" onclick="tab('sounds', this)">soundboard</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
        </div>
    </div>

    <div class="viewport">
        <div id="home" class="section active">
            <div class="page-header"><h1>gelly</h1><p>v2.4.3</p></div>
        </div>

        <div id="games" class="section">
            <div id="game-grid" class="grid" style="margin-top:40px;"></div>
        </div>

        <div id="proxy" class="section">
            <iframe id="proxy-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-top-navigation-by-user-activation allow-popups-to-escape-sandbox" loading="lazy"></iframe>
        </div>

        <div id="sounds" class="section">
            <iframe id="sound-frame"></iframe>
        </div>
    </div>

    <div id="player">
        <div class="player-bar">
            <button class="icon-btn" onclick="closeGame()">Back</button>
            <div id="player-title"></div>
            <button class="icon-btn" onclick="panic()">Panic</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" }
        ];

        function checkCode() {
            if (document.getElementById('secret-input').value === "gg55") {
                document.getElementById('landing').style.display = 'none';
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            
            if (id === 'proxy') {
                // Fresh load every time to clear stuck captchas
                document.getElementById('proxy-frame').src = 'https://storage.googleapis.com/canvas-lms/index.html#/search';
            }
        }

        function openGame(id, name) {
            document.getElementById('player').classList.add('active');
            document.getElementById('game-frame').src = `games/${id}/index.html`;
        }

        function closeGame() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('game-frame').src = '';
        }

        function panic() { window.location.href = 'https://google.com'; }

        function transfer() {
            const win = window.open('about:blank');
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.appendChild(ifr);
            window.close();
        }

        // Initialize grid
        const grid = document.getElementById('game-grid');
        gameData.forEach(g => {
            const div = document.createElement('div');
            div.className = 'game-card';
            div.onclick = () => openGame(g.id, g.name);
            div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
            grid.appendChild(div);
        });

        if (window.location.hash === "#cloaked") document.getElementById('landing').style.display = 'none';
    </script>
</body>
</html>
