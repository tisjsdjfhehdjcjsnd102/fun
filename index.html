<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
            transition: var(--transition);
        }
        #navbar.hidden { transform: translateY(-70px); opacity: 0; pointer-events: none; }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        .viewport { 
            padding-top: 70px; 
            height: 100vh; 
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .viewport.fullscreen-mode { padding-top: 0; }
        .viewport.no-scroll { overflow-y: hidden; }

        .section { display: none; padding: 100px 60px 60px 60px; animation: fadeIn 0.4s ease forwards; min-height: calc(100vh - 70px); position: relative; }
        .section.active { display: block; }

        .page-header { text-align: center; margin-bottom: 60px; width: 100%; position: relative; }
        .page-header h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .page-header p { color: var(--subtext); margin-top: 12px; font-weight: 600; font-size: 16px; opacity: 0.8; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }

        /* Sound Card: Tall Rectangle */
        .sound-card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            min-height: 220px; /* Taller Y-axis */
            transition: var(--transition); 
            border: 1px solid transparent;
            cursor: default;
        }
        .sound-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        
        .play-trigger {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid #222;
        }
        .play-trigger:hover { background: var(--accent); color: var(--bg); transform: scale(1.05); }
        .play-trigger svg { width: 30px; height: 30px; fill: currentColor; }

        .sound-name { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--subtext); 
            margin-top: 20px;
            text-align: center;
            word-break: break-word;
        }
        .sound-card:hover .sound-name { color: var(--accent); }

        /* Stop Button Icon */
        .stop-icon-btn {
            margin: 20px auto 0;
            background: #ff444415;
            color: #ff4444;
            border: 1px solid #ff444430;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .stop-icon-btn:hover { background: #ff4444; color: white; transform: scale(1.1); }

        /* Existing Game Card Styles */
        .game-card { background: var(--card); border-radius: 18px; padding: 12px; text-align: center; transition: var(--transition); cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        .game-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; }
        .game-card span { font-size: 14px; font-weight: 600; color: var(--subtext); display: block; }

        #proxy.section { padding: 0; height: calc(100vh - 70px); overflow: hidden; }
        #proxy-frame { width: 100%; height: 100%; border: none; background: transparent; }

        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; opacity: 0; pointer-events: none; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #player.active { opacity: 1; pointer-events: all; transform: scale(1); }
        .player-bar { height: 70px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--secondary); position: relative; }
        #game-frame { width: 100%; height: calc(100vh - 70px); border: none; }

        #landing { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #0b0b0b; position: fixed; z-index: 9999; }
        #secret-container { display: flex; align-items: center; }
        #secret-input { background: transparent; border: none; color: var(--subtext); opacity: 0.3; font-size: 14px; width: 80px; -webkit-text-security: disc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="landing">
        <div id="secret-container">
            <button id="check-btn" class="icon-btn" onclick="checkCode()">
                <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
            </button>
            <input type="text" id="secret-input" autocomplete="off">
        </div>
        <button id="secret-btn" class="icon-btn" onclick="transfer()" style="display:none; position: absolute; top: 20px; left: 20px;">
            <svg viewBox="0 0 24 24"><path d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z"/></svg>
        </button>
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active" onclick="tab('home', this)">home</button>
            <button class="nav-btn" onclick="tab('games', this)">games</button>
            <button class="nav-btn" onclick="tab('proxy', this)">proxy</button>
            <button class="nav-btn" onclick="tab('sounds', this)">soundboard</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
            <button class="icon-btn" onclick="toggleFS()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
            <button class="icon-btn" onclick="tab('settings', this)"><svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.13,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.2,0.06,0.47,0.12,0.61l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12c0,0.33,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></button>
        </div>
    </div>

    <div class="viewport" id="main-viewport">
        <div id="home" class="section active">
            <div class="page-header">
                <h1>gelly v2.4.3</h1>
                <p>if you dont like fries then LEAVE now...</p>
            </div>
        </div>
        
        <div id="games" class="section">
            <div class="page-header"><h1>gelly games</h1><p>click on a game to play</p></div>
            <div id="game-grid" class="grid"></div>
        </div>

        <div id="sounds" class="section">
            <div class="page-header">
                <h1>soundboard</h1>
                <p>high quality noise makers</p>
                <button class="stop-icon-btn" onclick="stopAllSounds()" title="stop all sounds">
                    <svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M18,18H6V6H18V18Z" /></svg>
                </button>
            </div>
            <div id="sound-grid" class="grid"></div>
        </div>

        <div id="proxy" class="section"><iframe id="proxy-frame" loading="lazy"></iframe></div>
        
        <div id="settings" class="section">
            <div class="page-header"><h1>settings</h1><p>configure your experience</p></div>
            <input type="text" id="panic-input" oninput="markUnsaved()" placeholder="https://google.com" style="padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-family: inherit; width: 350px;">
            <button class="nav-btn active" onclick="saveSettings()" style="margin-top:20px;">save changes</button>
        </div>
    </div>

    <div id="player">
        <div class="player-bar">
            <button class="icon-btn" onclick="closeGame()"><svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg></button>
            <div id="player-title" style="position:absolute; left:50%; transform:translateX(-50%); font-weight:600;"></div>
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        let activeAudios = [];
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" }
            // ... add more here
        ];

        const soundData = [
            "vine-boom.mp3",
            "bruh.mp3",
            "fart.mp3",
            "taco-bell.mp3",
            "reverb-fart.mp3",
            "metal-pipe.mp3"
        ];

        function draw() {
            const gGrid = document.getElementById('game-grid');
            gGrid.innerHTML = '';
            gameData.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => openGame(g.id, g.name);
                div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                gGrid.appendChild(div);
            });

            const sGrid = document.getElementById('sound-grid');
            sGrid.innerHTML = '';
            soundData.forEach(s => {
                const cleanName = s.replace('.mp3', '').replace(/-/g, ' ');
                const div = document.createElement('div');
                div.className = 'sound-card';
                div.innerHTML = `
                    <div class="play-trigger" onclick="playSound('${s}')">
                        <svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
                    </div>
                    <div class="sound-name">${cleanName}</div>
                `;
                sGrid.appendChild(div);
            });
        }

        function playSound(file) {
            const audio = new Audio(`sounds/${file}`);
            activeAudios.push(audio);
            audio.play();
            audio.onended = () => activeAudios = activeAudios.filter(a => a !== audio);
        }

        function stopAllSounds() {
            activeAudios.forEach(a => { a.pause(); a.currentTime = 0; });
            activeAudios = [];
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'proxy') document.getElementById('proxy-frame').src = 'https://storage.googleapis.com/canvas-lms/index.html#/search';
        }

        function openGame(id, name) {
            document.getElementById('player').classList.add('active');
            document.getElementById('player-title').innerText = name;
            document.getElementById('game-frame').src = `games/${id}/index.html`;
        }

        function closeGame() {
            document.getElementById('player').classList.remove('active');
            setTimeout(() => { document.getElementById('game-frame').src = ''; }, 400);
        }

        function checkCode() {
            if (document.getElementById('secret-input').value === "gg55") {
                document.getElementById('secret-container').style.display = 'none';
                document.getElementById('secret-btn').style.display = 'flex';
            }
        }

        function panic() { window.location.href = localStorage.getItem('gelly-panic') || 'https://google.com'; }
        
        function transfer() {
            const win = window.open('about:blank');
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh; margin:0;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.appendChild(ifr);
            window.close();
        }

        draw();
    </script>
</body>
</html>
