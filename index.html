<!DOCTYPE html>
<html>
<head>
    <title>gelly</title>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; height: 100vh; overflow: hidden; }
        .transfer-btn {
            position: fixed; top: 20px; left: 20px; padding: 8px 15px;
            font-size: 14px; color: #555; background-color: #e7e7e7;
            border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-family: sans-serif;
            z-index: 9999;
        }
        .transfer-btn:hover { background-color: #d7d7d7; }
    </style>
</head>
<body>

    <button class="transfer-btn" id="launchPortal">Transfer</button>

    <script>
        document.getElementById('launchPortal').onclick = function() {
            var win = window.open('about:blank', '_blank');
            var doc = win.document;

            var html = `
                <html>
                <head>
                    <title> </title>
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
                        
                        /* Sidebar Navigation */
                        #sidebar { width: 220px; background: #1a1a1a; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #333; box-sizing: border-box; }
                        .brand { font-size: 28px; font-weight: bold; color: #4CAF50; margin-bottom: 5px; }
                        .status-msg { font-size: 12px; color: #888; margin-bottom: 25px; padding: 10px; background: #222; border-radius: 5px; border-left: 3px solid #4CAF50; }
                        
                        .nav-btn { background: none; color: #aaa; border: none; padding: 12px 15px; text-align: left; cursor: pointer; font-size: 16px; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; }
                        .nav-btn:hover { background: #333; color: white; }
                        .nav-btn.active { background: #4CAF50; color: white; font-weight: bold; }

                        /* Main Content Area */
                        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
                        
                        /* Pages */
                        .page { display: none; padding: 40px; overflow-y: auto; height: 100%; box-sizing: border-box; }
                        .page.active { display: block; }
                        
                        /* Home Page */
                        .welcome-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
                        .welcome-text { font-size: 56px; font-weight: bold; margin-bottom: 10px; }
                        .sub-text { font-size: 18px; color: #888; }

                        /* Games Page */
                        #search { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 30px; outline: none; font-size: 16px; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
                        .game-card { background: #222; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
                        .game-card:hover { transform: translateY(-5px); border-color: #4CAF50; background: #2a2a2a; }
                        .game-card img { width: 110px; height: 110px; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
                        .game-card p { margin: 0; font-size: 14px; font-weight: bold; }

                        /* Soundboard Page */
                        .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
                        .sound-btn { background: #333; color: white; border: 1px solid #444; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
                        .sound-btn:hover { background: #444; }

                        /* Game Player View */
                        #player-container { display: none; width: 100%; height: 100%; background: #000; flex-direction: column; }
                        #player-nav { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
                        iframe { width: 100%; flex-grow: 1; border: none; }
                    </style>
                </head>
                <body>
                    <div id="sidebar">
                        <div class="brand">gelly</div>
                        <div class="status-msg">Update: Soundboard coming soon!</div>
                        
                        <button class="nav-btn active" id="btn-home" onclick="showPage('home')">Home</button>
                        <button class="nav-btn" id="btn-games" onclick="showPage('games')">Games</button>
                        <button class="nav-btn" id="btn-sounds" onclick="showPage('sounds')">Sound Board</button>
                    </div>

                    <div id="main-content">
                        <!-- Home Page -->
                        <div id="home" class="page active">
                            <div class="welcome-container">
                                <div class="welcome-text">Welcome to gelly, have fun</div>
                                <div class="sub-text">Click "Games" on the left to start playing.</div>
                            </div>
                        </div>

                        <!-- Games Page -->
                        <div id="games" class="page">
                            <input type="text" id="search" placeholder="Search games..." onkeyup="filterGames()">
                            <div class="grid">
                                <div class="game-card" onclick="openGame('./games/flappy/index.html')">
                                    <img src="./icons/flappybirdicon.png" alt="Flappy Bird">
                                    <p>Flappy Bird</p>
                                </div>
                                <div class="game-card" onclick="openGame('./games/drivemad/index.html')">
                                    <img src="./icons/drivemadicon.png" alt="Drive Mad">
                                    <p>Drive Mad</p>
                                </div>
                                <div class="game-card" onclick="openGame('./games/bitlife/index.html')">
                                    <img src="./icons/bitlifeicon.png" alt="BitLife">
                                    <p>BitLife</p>
                                </div>
                                <div class="game-card" onclick="openGame('./games/geodash/index.html')">
                                    <img src="./icons/geodashicon.png" alt="Geometry Dash">
                                    <p>Geometry Dash</p>
                                </div>
                                <div class="game-card" onclick="openGame('./games/tetris/index.html')">
                                    <img src="./icons/tetrisicon.png" alt="Tetris">
                                    <p>Tetris</p>
                                </div>
                            </div>
                        </div>

                        <!-- Sound Board Page -->
                        <div id="sounds" class="page">
                            <h2>Sound Board</h2>
                            <p style="color:#888">Upload mp3 files to your audio folder to get started!</p>
                            <div class="sound-grid">
                                <!-- Sound buttons will go here -->
                            </div>
                        </div>

                        <!-- Game Player Overlay -->
                        <div id="player-container">
                            <div id="player-nav">
                                <button class="nav-btn" onclick="closeGame()" style="background:#444; margin:0">← Back</button>
                                <span id="game-title" style="font-weight:bold; color:#4CAF50">Game Player</span>
                                <button class="nav-btn" onclick="toggleFull()" style="background:#444; margin:0">Fullscreen</button>
                            </div>
                            <iframe id="game-frame" src=""></iframe>
                        </div>
                    </div>

                    <script>
                        function showPage(pageId) {
                            // Hide everything
                            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                            document.getElementById('player-container').style.display = 'none';
                            
                            // Handle Nav Buttons
                            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                            document.getElementById('btn-' + pageId).classList.add('active');
                            
                            // Show Page
                            document.getElementById(pageId).classList.add('active');
                        }

                        function openGame(url) {
                            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                            document.getElementById('player-container').style.display = 'flex';
                            document.getElementById('game-frame').src = url;
                        }

                        function closeGame() {
                            document.getElementById('game-frame').src = '';
                            document.getElementById('player-container').style.display = 'none';
                            showPage('games');
                        }

                        function toggleFull() {
                            var frame = document.getElementById("game-frame");
                            if (frame.requestFullscreen) { frame.requestFullscreen(); }
                            else if (frame.webkitRequestFullscreen) { frame.webkitRequestFullscreen(); }
                        }

                        function filterGames() {
                            let input = document.getElementById('search').value.toLowerCase();
                            let cards = document.querySelectorAll('.game-card');
                            cards.forEach(card => {
                                let title = card.innerText.toLowerCase();
                                card.style.display = title.includes(input) ? "block" : "none";
                            });
                        }
                    <\/script>
                </body>
                </html>
            `;
            doc.write(html);
            doc.close();
        };
    </script>
</body>
</html>
