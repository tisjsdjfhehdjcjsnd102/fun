<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --card: #111111;
            --accent: #ffffff;
            --secondary: #1a1a1a;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            cursor: default;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            text-transform: lowercase;
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        .animate { animation: fadeIn var(--transition); }

        /* --- Landing Screen --- */
        #landing {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: var(--bg);
        }

        .transfer-btn {
            padding: 15px 40px;
            background: none;
            border: 1px solid var(--secondary);
            color: var(--text);
            border-radius: 100px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: var(--transition);
            cursor: pointer;
        }

        .transfer-btn:hover {
            background: var(--text);
            color: var(--bg);
            transform: scale(1.05);
        }

        /* --- Main Layout --- */
        #main-ui {
            display: none;
            height: 100vh;
            display: flex;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--secondary);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 50px;
            padding-left: 10px;
            letter-spacing: -1px;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            color: var(--subtext);
            transition: var(--transition);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--secondary);
            color: var(--accent);
        }

        /* --- Content Area --- */
        .viewport {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        /* --- Games Grid --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        input, select {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
        }

        input { flex: 1; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 10px;
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .game-card:hover {
            transform: scale(1.05);
            background: var(--secondary);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .game-card span { font-size: 13px; font-weight: 600; color: var(--subtext); }

        /* --- Player Overlay --- */
        #player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 10000;
        }

        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            background: var(--sidebar);
        }

        .top-right {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .btn {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-panic { color: var(--panic); }

        iframe { width: 100%; height: calc(100% - 60px); border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transfer()">transfer</button>
    </div>

    <div id="main-ui" class="hidden">
        <div id="sidebar">
            <div class="brand">gelly</div>
            <div class="nav-item active" onclick="showTab('home', this)">home</div>
            <div class="nav-item" onclick="showTab('games', this)">games</div>
            <div class="nav-item" onclick="showTab('sounds', this)">soundboard</div>
        </div>

        <div class="viewport">
            <div id="home" class="section active">
                <h1 style="font-size: 48px; font-weight: 900; margin: 0;">gelly</h1>
                <p style="color: var(--subtext); max-width: 450px; line-height: 1.6; margin-top: 20px;">
                    welcome to gelly. a smooth, dark, and animated hub for games and sounds. 
                    everything is built to be fast and minimalist.
                </p>
            </div>

            <div id="games" class="section">
                <div class="controls">
                    <input type="text" id="search" placeholder="search games..." oninput="render()">
                    <select id="sort" onchange="render()">
                        <option value="az">a-z</option>
                        <option value="za">z-a</option>
                    </select>
                </div>
                <div class="grid" id="game-grid"></div>
            </div>

            <div id="sounds" class="section">
                <iframe src="soundboard/index.html" style="height: 80vh; border-radius: 24px;"></iframe>
            </div>
        </div>
    </div>

    <div id="player">
        <div class="top-bar">
            <button class="btn" onclick="closeGame()">back</button>
            <div class="top-right">
                <button class="btn" onclick="toggleFS()">fullscreen</button>
                <button class="btn btn-panic" onclick="panic()">panic</button>
            </div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const games = [
            { name: "2048", id: "2048", icon: "2048icon.png" },
            { name: "bitlife", id: "bitlife", icon: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", icon: "cookieclickericon.png" },
            { name: "crossy road", id: "crossyroad", icon: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", icon: "dinogameicon.png" },
            { name: "doodle jump", id: "doodlejump", icon: "doodlejumpicon.png" },
            { name: "drive mad", id: "drivemad", icon: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", icon: "ducklifeicon.png" },
            { name: "flappy bird", id: "flappy", icon: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", icon: "geodashicon.png" },
            { name: "minecraft", id: "minecraft", icon: "minecrafticon.png" },
            { name: "paper.io 2", id: "paperio2", icon: "paperio2icon.png" },
            { name: "red ball", id: "redball", icon: "redballicon.png" },
            { name: "run 3", id: "run3", icon: "run3icon.png" },
            { name: "slope", id: "slope", icon: "slopeicon.png" },
            { name: "stickman hook", id: "stickmanhook", icon: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", icon: "tetrisicon.png" },
            { name: "vex 4", id: "vex4", icon: "vex4icon.png" }
        ];

        function transfer() {
            let win = window.open();
            if (!win) {
                alert("please allow popups.");
                return;
            }
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            win.document.body.style.background = '#050505';
            let ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100%;";
            ifr.src = window.location.href;
            win.document.body.appendChild(ifr);
            window.location.replace("https://classroom.google.com");
        }

        // Auto-load UI if already cloaked
        if (window.self !== window.top) {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        function render() {
            const grid = document.getElementById('game-grid');
            const search = document.getElementById('search').value.toLowerCase();
            const sort = document.getElementById('sort').value;

            let filtered = games.filter(g => g.name.includes(search));
            filtered.sort((a, b) => sort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));

            grid.innerHTML = '';
            filtered.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card animate';
                card.onclick = () => {
                    document.getElementById('player').style.display = 'block';
                    document.getElementById('game-frame').src = `games/${g.id}/index.html`;
                };
                card.innerHTML = `<img src="icons/${g.icon}"><span>${g.name}</span>`;
                grid.appendChild(card);
            });
        }

        function closeGame() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function panic() { window.location.href = "https://classroom.google.com"; }

        function toggleFS() {
            let f = document.getElementById('game-frame');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
        }

        render();
    </script>
</body>
</html>
