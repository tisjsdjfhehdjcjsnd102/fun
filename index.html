<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        /* Navbar Styling */
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
            transition: var(--transition);
        }
        #navbar.hidden, .player-bar.hidden { display: none !important; }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        .viewport { 
            padding-top: 70px; 
            height: 100vh; 
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .viewport.no-scroll { overflow-y: hidden; }

        .section { display: none; padding: 40px; animation: fadeIn 0.4s ease forwards; min-height: calc(100vh - 70px); }
        .section.active { display: block; }

        /* Headers */
        .page-header { text-align: center; margin-bottom: 50px; width: 100%; margin-top: 20px; }
        .page-header h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .page-header p { color: var(--subtext); margin-top: 10px; font-weight: 600; font-size: 16px; }

        /* Search & Count - Fixed to span width */
        .search-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; width: 100%; }
        #game-search { padding: 12px 20px; background: var(--secondary); color: white; border: 1px solid #222; border-radius: 12px; font-family: 'Inter', sans-serif; width: 400px; font-weight: 600; }
        .game-count { color: var(--subtext); font-weight: 600; }

        /* Grid - Fixed to span all the way across */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            width: 100%;
            max-width: 1600px; /* Increased to go across screen */
            margin: 0 auto; 
        }
        .game-card { background: var(--card); border-radius: 18px; padding: 15px; text-align: center; transition: var(--transition); cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        .game-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; }
        .game-card span { font-size: 14px; font-weight: 600; color: var(--subtext); display: block; }

        /* Player Overlay */
        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; display: none; }
        #player.active { display: block; }
        .player-bar { height: 70px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--secondary); }
        #player-title { font-weight: 600; color: var(--subtext); }
        #game-frame { width: 100%; height: calc(100vh - 70px); border: none; }

        /* Secret Entrance */
        #landing { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: #0b0b0b; position: fixed; top: 0; left: 0; z-index: 9999; }
        #secret-input { background: var(--secondary); border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; text-align: center; font-family: inherit; width: 200px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="landing">
        <input type="password" id="secret-input" placeholder="enter passcode" oninput="checkCode()">
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active" onclick="tab('home', this)">home</button>
            <button class="nav-btn" onclick="tab('games', this)">games</button>
            <button class="nav-btn" onclick="tab('proxy', this)">proxy</button>
            <button class="nav-btn" onclick="tab('sounds', this)">soundboard</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="aboutBlank()">cloak</button>
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
            <button class="icon-btn" onclick="tab('settings', this)"><svg viewBox="0 0 24 24"><path d="M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></button>
        </div>
    </div>

    <div class="viewport" id="main-viewport">
        <div id="home" class="section active">
            <div class="page-header">
                <h1>gelly v2.4.9</h1>
                <p>if you dont like fries then LEAVE now...</p>
            </div>
        </div>
        
        <div id="games" class="section">
            <div class="page-header">
                <h1>gelly games</h1>
                <p>unblocked and high performance.</p>
            </div>
            <div class="search-container">
                <input type="text" id="game-search" placeholder="search games..." oninput="draw(this.value)">
                <div id="count-display" class="game-count">0</div>
            </div>
            <div id="game-grid" class="grid"></div>
        </div>

        <div id="proxy" class="section">
            <iframe id="proxy-frame" style="width:100%; height:80vh; border:none;" src="https://storage.googleapis.com/canvas-lms/index.html#/search"></iframe>
        </div>
        
        <div id="sounds" class="section">
            <iframe id="sound-frame" style="width:100%; height:80vh; border:none;"></iframe>
        </div>

        <div id="settings" class="section">
            <div class="page-header"><h1>settings</h1><p>configure your experience</p></div>
            <div style="max-width: 400px; margin: 0 auto; text-align: center;">
                <input type="text" id="panic-input" placeholder="panic url (https://...)" style="padding:12px; background:var(--secondary); color:white; border:none; border-radius:10px; width:100%; margin-bottom: 20px;">
                <button class="nav-btn active" onclick="saveSettings()" style="width: 100%;">save changes</button>
            </div>
        </div>
    </div>

    <div id="player">
        <div class="player-bar">
            <button class="icon-btn" onclick="closeGame()">back</button>
            <div id="player-title"></div>
            <button class="icon-btn" onclick="toggleFS()">FS</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" },
            { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" },
            { name: "drive mad", id: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" },
            { name: "flappy bird", id: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" },
            { name: "getting over it", id: "gettingoverit", img: "gettingoveriticon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", id: "redball", img: "redballicon.png" },
            { name: "run 3", id: "run3", img: "run3icon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" },
            { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" },
            { name: "tiny fishing", id: "tinyfishing", img: "tinyfishingicon.png" },
            { name: "vex 4", id: "vex4", img: "vex4icon.png" },
            { name: "moto x3m", id: "motox3m", img: "motox3micon.png" },
            { name: "drift hunters", id: "drifthunters", img: "drifthuntersicon.png" },
            { name: "suika game", id: "suikagame", img: "suikagameicon.png" },
            { name: "traffic run", id: "trafficrun", img: "trafficrunicon.png" },
            { name: "worlds hardest game", id: "worldshardestgame", img: "worldshardestgameicon.png" },
            { name: "survival race", id: "survivalrace", img: "survivalraceicon.png" },
            { name: "the impossible quiz", id: "theimpossiblequiz", img: "theimpossiblequizicon.png" },
            { name: "gun spin", id: "gunspin", img: "gunspinicon.png" },
            { name: "cluster rush", id: "clusterrush", img: "clusterrushicon.png" },
            { name: "traffic jam 3d", id: "trafficjam3d", img: "trafficjam3dicon.png" }
        ];

        function checkCode() {
            if (document.getElementById('secret-input').value === "gg55") {
                document.getElementById('landing').style.display = 'none';
            }
        }

        function aboutBlank() {
            const win = window.open();
            const url = window.location.href;
            const iframe = win.document.createElement('iframe');
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.src = url;
            win.document.body.appendChild(iframe);
            window.location.replace("https://google.com");
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if (id === 'sounds') document.getElementById('sound-frame').src = 'soundboard/index.html';
        }

        function draw(query = "") {
            const grid = document.getElementById('game-grid');
            const countDisplay = document.getElementById('count-display');
            grid.innerHTML = '';
            const filtered = gameData.filter(g => g.name.toLowerCase().includes(query.toLowerCase()));
            countDisplay.innerText = filtered.length;
            filtered.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => openGame(g.id, g.name);
                div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                grid.appendChild(div);
            });
        }

        function openGame(id, name) {
            document.getElementById('player').classList.add('active');
            document.getElementById('player-title').innerText = name;
            document.getElementById('game-frame').src = `games/${id}/index.html`;
        }

        function closeGame() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('game-frame').src = '';
        }

        function toggleFS() { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function panic() { 
            window.location.href = localStorage.getItem('gelly-panic') || 'https://google.com'; 
        }

        function saveSettings() {
            localStorage.setItem('gelly-panic', document.getElementById('panic-input').value);
            alert("settings saved.");
        }

        draw();
    </script>
</body>
</html>
