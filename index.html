<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Landing & Secret Area */
        #landing { 
            height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: flex-start; 
            padding: 20px; background: #0b0b0b; position: fixed; z-index: 9999; 
        }
        
        .secret-wrapper { position: relative; display: flex; align-items: center; gap: 2px; }

        #secret-container { 
            display: flex; align-items: center; transition: opacity 0.4s ease, transform 0.4s ease; 
        }
        #secret-container.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }

        #secret-input { 
            background: transparent; border: none; color: transparent; 
            font-family: inherit; font-size: 14px; width: 50px; 
            caret-color: var(--subtext); cursor: text; padding: 0;
        }

        #dot-display { 
            position: absolute; left: 32px; display: flex; gap: 3px; pointer-events: none; 
            color: var(--subtext); opacity: 0.4; font-weight: 900; font-size: 18px; line-height: 0;
        }

        .icon-unit {
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            color: var(--subtext); opacity: 0.4; transition: var(--transition);
        }
        
        #check-btn { background: none; border: none; cursor: pointer; padding: 0; }
        #check-btn:hover { opacity: 1; color: var(--accent); }
        #check-btn svg, #secret-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* Transfer Icon - Positioned exactly where the check was */
        #secret-btn { 
            position: absolute; top: 0; left: 0;
            background: none; border: none; border-radius: 8px;
            opacity: 0; transform: scale(0.8);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease; 
            visibility: hidden; pointer-events: none;
        }
        #secret-btn.active { 
            visibility: visible; pointer-events: all; opacity: 0.4; transform: scale(1);
        }
        #secret-btn.active:hover { opacity: 1; color: var(--accent); background: var(--secondary); }

        /* Main UI */
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn.active { color: var(--accent); background: var(--secondary); }

        .viewport { padding-top: 70px; height: 100vh; }
        .section { display: none; padding: 40px 60px; }
        .section.active { display: block; }
    </style>
</head>
<body onload="focusInput()">

    <div id="landing">
        <div class="secret-wrapper">
            <div id="secret-container">
                <button id="check-btn" class="icon-unit" onclick="checkCode()">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                </button>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="secret-input" maxlength="4" autocomplete="off" oninput="updateVisualDots()">
                    <div id="dot-display">...</div>
                </div>
            </div>

            <button id="secret-btn" class="icon-unit" onclick="transfer()">
                <svg viewBox="0 0 24 24"><path d="M7,2V4H8V18A4,4 0 0,0 12,22A4,4 0 0,0 16,18V4H17V2H7M14,18A2,2 0 0,1 12,20A2,2 0 0,1 10,18V4H14V18Z"/></svg>
            </button>
        </div>
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active">home</button>
            <button class="nav-btn">games</button>
        </div>
    </div>

    <div class="viewport">
        <div class="section active">
            <h1 style="font-size: 50px; font-weight: 900;">gelly v2.1.2</h1>
        </div>
    </div>

    <script>
        // Auto-focus on load
        function focusInput() {
            document.getElementById('secret-input').focus();
        }

        // Keep focus if user clicks away on the landing background
        document.getElementById('landing').addEventListener('click', () => {
            if (!document.getElementById('secret-btn').classList.contains('active')) {
                focusInput();
            }
        });

        function updateVisualDots() {
            const input = document.getElementById('secret-input');
            const display = document.getElementById('dot-display');
            if (input.value.length === 0) {
                display.innerText = "...";
            } else {
                display.innerText = ".".repeat(input.value.length);
            }
        }

        function checkCode() {
            const input = document.getElementById('secret-input');
            const container = document.getElementById('secret-container');
            const secretBtn = document.getElementById('secret-btn');

            if (input.value === "gg55") {
                container.classList.add('hidden');
                setTimeout(() => {
                    secretBtn.classList.add('active');
                }, 400);
            } else {
                input.value = "";
                updateVisualDots();
            }
        }

        document.getElementById('secret-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkCode();
        });

        function transfer() {
            const win = window.open();
            if (!win) return;
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh; margin:0;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.style.margin = '0';
            win.document.body.appendChild(ifr);
            window.close();
        }

        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').style.display = 'none';
        }
    </script>
</body>
</html>
