<div id="landing"><div class="transfer-lock"><input type="password" id="transfer-code" placeholder="enter code..." autocomplete="off"><button id="unlock-btn">✓</button><button class="transfer-btn" onclick="transfer()">transfer</button></div></div>

<style>

.transfer-lock{position:absolute;top:30px;left:20px;width:230px;height:45px;}

#transfer-code{position:absolute;top:0;left:0;width:calc(100% - 55px);height:45px;z-index:5;background:transparent;border:none;border-radius:12px;color:var(--text);padding:0 14px;font-size:14px;font-weight:600;outline:none;font-family:inherit;transition:opacity .5s ease,transform .5s ease,background .3s ease;}

#transfer-code::placeholder{color:var(--subtext);}

#transfer-code:hover,#transfer-code:focus{background:var(--secondary);}

#unlock-btn{position:absolute;top:0;right:0;width:45px;height:45px;z-index:5;background:transparent;border:none;border-radius:12px;color:var(--subtext);font-size:16px;font-weight:700;font-family:inherit;transition:var(--transition);}

#unlock-btn:hover{background:var(--secondary);color:var(--accent);}

.transfer-btn{position:absolute;top:0;left:0;width:calc(100% - 55px);height:45px;padding:12px 18px;background:transparent;border:none;color:var(--subtext);border-radius:12px;font-size:14px;font-weight:600;transition:var(--transition);font-family:inherit;z-index:1;}

.transfer-btn:hover{background:var(--secondary);color:var(--accent);}

.transfer-unlocked #transfer-code,.transfer-unlocked #unlock-btn{opacity:0;pointer-events:none;transform:translateY(-10px);}

</style>

<script>

function unlockTransfer(){const code=document.getElementById('transfer-code').value;

if(code==='gg55'){document.querySelector('.transfer-lock').classList.add('transfer-unlocked');}

else{document.body.innerHTML='';document.body.style.background=getComputedStyle(document.documentElement).getPropertyValue('--bg');document.title='about:blank';}}

document.getElementById('unlock-btn').addEventListener('click',unlockTransfer);

document.getElementById('transfer-code').addEventListener('keydown',e=>{if(e.key==='Enter')unlockTransfer();});

function transfer(){

const win=window.open();

if(!win)return alert("allow popups");

win.document.title='about:blank';

win.document.body.style.margin='0';

win.document.body.style.background=getComputedStyle(document.documentElement).getPropertyValue('--bg');

const ifr=win.document.createElement('iframe');

ifr.style="border:none;width:100%;height:100vh;";

ifr.referrerPolicy="no-referrer";

ifr.src=window.location.href+"#cloaked";

win.document.body.appendChild(ifr);

}

</script>
