<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
            transition: var(--transition);
        }
        #navbar.hidden { transform: translateY(-70px); opacity: 0; pointer-events: none; }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        .viewport { 
            padding-top: 70px; 
            height: 100vh; 
            width: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            scroll-behavior: smooth;
            transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .viewport.fullscreen-mode { padding-top: 0; }
        .viewport.no-scroll { overflow-y: hidden; }

        .section { display: none; padding: 100px 60px 60px 60px; animation: fadeIn 0.4s ease forwards; min-height: calc(100vh - 70px); }
        .section.active { display: block; }

        .page-header { text-align: center; margin-bottom: 60px; width: 100%; }
        .page-header h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .page-header p { color: var(--subtext); margin-top: 12px; font-weight: 600; font-size: 16px; opacity: 0.8; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; }

        /* Game Cards */
        .game-card { background: var(--card); border-radius: 18px; padding: 12px; text-align: center; transition: var(--transition); cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        .game-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; }
        .game-card span { font-size: 14px; font-weight: 600; color: var(--subtext); transition: var(--transition); display: block; }
        .game-card:hover span { color: var(--accent); }

        /* Sound Cards: Tall Rectangles */
        .sound-card { 
            background: var(--card); border-radius: 20px; padding: 25px 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            min-height: 220px; transition: var(--transition); border: 1px solid transparent;
        }
        .sound-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        
        .sound-play-btn {
            width: 70px; height: 70px; border-radius: 20px; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); cursor: pointer; transition: var(--transition); border: 1px solid #222;
        }
        .sound-play-btn:hover { background: var(--accent); color: var(--bg); transform: scale(1.1); }
        .sound-play-btn svg { width: 30px; height: 30px; fill: currentColor; }
        .sound-name { font-size: 14px; font-weight: 600; color: var(--subtext); margin-top: 20px; text-align: center; }

        /* Stop Icon */
        .stop-sounds-btn {
            background: #ff444415; color: #ff4444; border: 1px solid #ff444430;
            width: 50px; height: 50px; border-radius: 15px; margin: 20px auto 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
        }
        .stop-sounds-btn:hover { background: #ff4444; color: white; transform: scale(1.1); }

        /* Rest of UI */
        #proxy.section { padding: 0; height: calc(100vh - 70px); overflow: hidden; }
        #proxy-frame { width: 100%; height: 100%; border: none; display: block; }

        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; opacity: 0; pointer-events: none; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #player.active { opacity: 1; pointer-events: all; transform: scale(1); }
        .player-bar { height: 70px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--secondary); }
        #game-frame { width: 100%; height: calc(100vh - 70px); border: none; }

        #landing { height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px; background: #0b0b0b; position: fixed; z-index: 9999; }
        #secret-input { background: transparent; border: none; color: var(--subtext); opacity: 0.3; font-size: 14px; width: 80px; -webkit-text-security: disc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="landing">
        <div id="secret-container" style="display:flex; align-items:center;">
            <button class="icon-btn" onclick="checkCode()"><svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg></button>
            <input type="text" id="secret-input" autocomplete="off">
        </div>
        <button id="secret-btn" class="icon-btn" onclick="transfer()" style="display:none;"><svg viewBox="0 0 24 24"><path d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z"/></svg></button>
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active" onclick="tab('home', this)">home</button>
            <button class="nav-btn" onclick="tab('games', this)">games</button>
            <button class="nav-btn" onclick="tab('proxy', this)">proxy</button>
            <button class="nav-btn" onclick="tab('sounds', this)">soundboard</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
            <button class="icon-btn" onclick="toggleFS()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
    </div>

    <div class="viewport" id="main-viewport">
        <div id="home" class="section active"><div class="page-header"><h1>gelly v2.4.3</h1><p>if you dont like fries then LEAVE now...</p></div></div>
        <div id="games" class="section"><div class="page-header"><h1>gelly games</h1><p>click on a game to play</p></div><div id="game-grid" class="grid"></div></div>
        <div id="proxy" class="section"><iframe id="proxy-frame" loading="lazy"></iframe></div>
        <div id="sounds" class="section">
            <div class="page-header"><h1>soundboard</h1><p>click to play</p>
                <button class="stop-sounds-btn" onclick="stopAllSounds()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M18,18H6V6H18V18Z" /></svg></button>
            </div>
            <div id="sound-grid" class="grid"></div>
        </div>
    </div>

    <div id="player">
        <div class="player-bar">
            <button class="icon-btn" onclick="closeGame()"><svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg></button>
            <div id="player-title" style="font-weight:600;"></div>
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        let activeAudios = [];
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" }, { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" }, { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" }, { name: "drive mad", id: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" }, { name: "flappy bird", id: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" }, { name: "getting over it", id: "gettingoverit", img: "gettingoveriticon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" }, { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", id: "redball", img: "redballicon.png" }, { name: "run 3", id: "run3", img: "run3icon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" }, { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" }, { name: "tiny fishing", id: "tinyfishing", img: "tinyfishingicon.png" },
            { name: "vex 4", id: "vex4", img: "vex4icon.png" }, { name: "moto x3m", id: "motox3m", img: "motox3micon.png" },
            { name: "drift hunters", id: "drifthunters", img: "drifthuntersicon.png" }, { name: "suika game", id: "suikagame", img: "suikagameicon.png" },
            { name: "worlds hardest game", id: "worldshardestgame", img: "worldshardestgameicon.png" }, { name: "survival race", id: "survivalrace", img: "survivalraceicon.png" },
            { name: "the impossible quiz", id: "theimpossiblequiz", img: "theimpossiblequizicon.png" }
        ];

        const soundData = ["boom.mp3", "bruh.mp3", "fart.mp3"]; // Put your mp3 names here

        function checkCode() {
            if (document.getElementById('secret-input').value === "gg55") {
                document.getElementById('landing').style.display = 'none';
            }
        }

        function draw() {
            const gGrid = document.getElementById('game-grid');
            gGrid.innerHTML = '';
            gameData.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => openGame(g.id, g.name);
                div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                gGrid.appendChild(div);
            });

            const sGrid = document.getElementById('sound-grid');
            sGrid.innerHTML = '';
            soundData.forEach(s => {
                const name = s.replace('.mp3', '').replace(/-/g, ' ');
                const div = document.createElement('div');
                div.className = 'sound-card';
                div.innerHTML = `<div class="sound-play-btn" onclick="playSound('${s}')"><svg viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg></div><div class="sound-name">${name}</div>`;
                sGrid.appendChild(div);
            });
        }

        function playSound(file) {
            const audio = new Audio(`sounds/${file}`);
            activeAudios.push(audio);
            audio.play();
            audio.onended = () => activeAudios = activeAudios.filter(a => a !== audio);
        }

        function stopAllSounds() {
            activeAudios.forEach(a => { a.pause(); a.currentTime = 0; });
            activeAudios = [];
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'proxy') document.getElementById('proxy-frame').src = 'https://storage.googleapis.com/canvas-lms/index.html#/search';
        }

        function openGame(id, name) {
            document.getElementById('player').classList.add('active');
            document.getElementById('player-title').innerText = name;
            document.getElementById('game-frame').src = `games/${id}/index.html`;
            document.getElementById('navbar').classList.add('hidden');
        }

        function closeGame() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('navbar').classList.remove('hidden');
            setTimeout(() => { document.getElementById('game-frame').src = ''; }, 400);
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function panic() { window.location.href = 'https://google.com'; }

        draw();
    </script>
</body>
</html>
