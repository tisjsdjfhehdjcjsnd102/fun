<!DOCTYPE html>
<html>
<head>
    <title>gelly</title> <!-- Tab name changed to Gelly -->
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; height: 100vh; overflow: hidden; }
        
        /* Transfer button in the TOP-LEFT */
        .transfer-btn {
            position: fixed; 
            top: 20px; 
            left: 20px; 
            padding: 8px 15px;
            font-size: 14px; 
            color: #555; 
            background-color: #e7e7e7;
            border: 1px solid #ccc; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: sans-serif;
            z-index: 9999;
        }
        .transfer-btn:hover { background-color: #d7d7d7; }
    </style>
</head>
<body>

    <button class="transfer-btn" id="launchPortal">Transfer</button>

    <script>
        document.getElementById('launchPortal').onclick = function() {
            var win = window.open('about:blank', '_blank');
            var doc = win.document;

            var html = `
                <html>
                <head>
                    <title> </title> <!-- Blank title for the secret tab -->
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
                        #nav-bar { display: none; background: #222; padding: 10px; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
                        .nav-btn { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
                        #home-portal { padding: 20px; overflow-y: auto; flex-grow: 1; }
                        #search { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 20px; outline: none; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
                        .game-card { background: #222; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
                        .game-card:hover { transform: scale(1.05); border-color: #4CAF50; }
                        .game-card img { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; }
                        .game-card p { margin-top: 8px; font-size: 13px; font-weight: bold; }
                        #game-container { display: none; flex-grow: 1; background: #000; }
                        iframe { width: 100%; height: 100%; border: none; }
                    </style>
                </head>
                <body>
                    <div id="nav-bar">
                        <button class="nav-btn" onclick="goHome()">← Home</button>
                        <button class="nav-btn" onclick="toggleFull()">Fullscreen [ ]</button>
                    </div>

                    <div id="home-portal">
                        <input type="text" id="search" placeholder="Search games..." onkeyup="filterGames()">
                        <div class="grid" id="gameGrid">
                            
                            <!-- DRIVE MAD -->
                            <div class="game-card" onclick="openGame('https://www.google.com/recaptcha/api2/aframe')">
                                <img src="https://googleusercontent.com" alt="Drive Mad">
                                <p>Drive Mad</p>
                            </div>

                            <!-- SLOPE -->
                            <div class="game-card" onclick="openGame('https://github.io')">
                                <img src="https://googleusercontent.com" alt="Slope">
                                <p>Slope</p>
                            </div>

                            <!-- RETRO BOWL -->
                            <div class="game-card" onclick="openGame('https://github.io')">
                                <img src="https://googleusercontent.com" alt="Retro Bowl">
                                <p>Retro Bowl</p>
                            </div>

                            <!-- SUBWAY SURFERS -->
                            <div class="game-card" onclick="openGame('https://github.io')">
                                <img src="https://googleusercontent.com" alt="Subway Surfers">
                                <p>Subway Surfers</p>
                            </div>

                        </div>
                    </div>

                    <div id="game-container">
                        <iframe id="game-frame" src=""></iframe>
                    </div>

                    <script>
                        function openGame(url) {
                            document.getElementById('home-portal').style.display = 'none';
                            document.getElementById('nav-bar').style.display = 'flex';
                            document.getElementById('game-container').style.display = 'block';
                            document.getElementById('game-frame').src = url;
                        }
                        function goHome() {
                            document.getElementById('game-frame').src = '';
                            document.getElementById('game-container').style.display = 'none';
                            document.getElementById('nav-bar').style.display = 'none';
                            document.getElementById('home-portal').style.display = 'block';
                        }
                        function toggleFull() {
                            var elem = document.getElementById("game-frame");
                            if (elem.requestFullscreen) { elem.requestFullscreen(); }
                            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
                        }
                        function filterGames() {
                            let input = document.getElementById('search').value.toLowerCase();
                            let cards = document.getElementsByClassName('game-card');
                            for (let i = 0; i < cards.length; i++) {
                                let title = cards[i].innerText.toLowerCase();
                                cards[i].style.display = title.includes(input) ? "block" : "none";
                            }
                        }
                    <\/script>
                </body>
                </html>
            `;
            doc.write(html);
            doc.close();
        };
    </script>
</body>
</html>
