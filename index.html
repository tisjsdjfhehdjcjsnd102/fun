<!DOCTYPE html>
<html>
<head>
    <title> </title>
    <style>
        /* This makes the whole page look empty and clean */
        body { margin: 0; padding: 0; background-color: #ffffff; height: 100vh; overflow: hidden; }

        /* Styles the small grey button in the bottom left */
        .transfer-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 8px 15px;
            font-size: 14px;
            color: #555;
            background-color: #e7e7e7; /* Light grey color */
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            transition: 0.2s;
        }

        .transfer-btn:hover {
            background-color: #d7d7d7; /* Slightly darker grey on hover */
        }
    </style>
</head>
<body>

    <!-- Only the transfer button is visible on the start page -->
    <button class="transfer-btn" id="launchPortal">Transfer</button>

    <script>
        document.getElementById('launchPortal').onclick = function() {
            var win = window.open('about:blank', '_blank');
            var doc = win.document;

            // This is your hidden game portal content
            var html = `
                <html>
                <head>
                    <title> </title>
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
                        #search { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 20px; outline: none; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
                        .game-card { background: #222; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
                        .game-card:hover { background: #333; border-color: #4CAF50; transform: translateY(-3px); }
                        .game-card img { width: 120px; height: 120px; border-radius: 8px; object-fit: cover; }
                        .game-card p { margin-top: 10px; font-weight: bold; }
                    </style>
                </head>
                <body>
                    <input type="text" id="search" placeholder="Search for a game..." onkeyup="filterGames()">
                    <div class="grid" id="gameGrid">
                        <!-- Add your game cards below this line -->
                        <div class="game-card" onclick="location.href='https://example-game-link.com'">
                            <img src="your-icon-file.png" alt="Game Name">
                            <p>Game Name</p>
                        </div>
                    </div>

                    <script>
                        function filterGames() {
                            let input = document.getElementById('search').value.toLowerCase();
                            let cards = document.getElementsByClassName('game-card');
                            for (let i = 0; i < cards.length; i++) {
                                let title = cards[i].getElementsByTagName('p')[0].innerText.toLowerCase();
                                cards[i].style.display = title.includes(input) ? "block" : "none";
                            }
                        }
                    <\/script>
                </body>
                </html>
            `;
            doc.write(html);
            doc.close();
        };
    </script>
</body>
</html>
