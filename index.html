<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --sidebar: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            text-transform: lowercase;
            cursor: default;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        button, .nav-item, .game-card, .game-card *, select, input {
            cursor: pointer;
        }
        input[type="text"] { cursor: text; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #landing {
            height: 100vh;
            width: 100vw;
            display: flex;
            background: var(--bg);
            position: fixed;
            z-index: 9999;
        }

        .transfer-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: none;
            border: 1px solid transparent;
            color: var(--subtext);
            border-radius: 12px;
            font-size: 13px;
            transition: var(--transition);
        }

        .transfer-btn:hover {
            background: var(--secondary);
            border-color: var(--secondary);
            color: var(--accent);
        }

        #main-ui {
            display: none;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--secondary);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            transition: var(--transition);
            z-index: 10;
        }

        .sidebar-hidden #sidebar {
            margin-left: -260px;
            opacity: 0;
            pointer-events: none;
        }

        .brand {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 50px;
            padding-left: 10px;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .nav-items { flex: 1; }

        .nav-item, .btn {
            padding: 12px 18px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--subtext);
            background: none;
            border: none;
            transition: var(--transition);
            font-weight: 600;
            text-align: left;
            font-size: 14px;
            display: block;
            width: 100%;
            font-family: inherit;
        }

        .nav-item:hover, .nav-item.active, .btn:hover {
            background: var(--secondary);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 10px;
            font-size: 11px;
            color: #222;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .viewport {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            transition: var(--transition);
        }

        .section { display: none; animation: fadeIn 0.5s ease; height: 100%; }
        .section.active { display: block; }
        
        #home { padding: 60px 80px; }
        #home h1 { font-size: 56px; font-weight: 900; margin-bottom: 35px; letter-spacing: -2px; }
        #home p { color: var(--subtext); font-size: 18px; margin-left: 4px; }

        #games { padding: 40px; }

        .counter-label {
            font-size: 12px;
            color: var(--subtext);
            font-weight: 600;
            margin-bottom: 5px;
            padding-left: 5px;
            display: block;
        }

        #sounds { width: 100%; height: 100%; padding: 0; }
        #sounds iframe { width: 100%; height: 100%; border: none; }

        .controls { display: flex; gap: 15px; margin-bottom: 40px; }
        input, select {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
        }
        input#search { flex: 1; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card);
            border-radius: 18px;
            padding: 10px;
            transition: var(--transition);
            text-align: center;
        }

        .game-card:hover { transform: scale(1.03); background: var(--secondary); }
        .game-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; object-fit: cover; }
        .game-card span { font-size: 12px; color: var(--subtext); font-weight: 600; }

        #player {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #player.active { display: block; opacity: 1; }

        .top-bar {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--secondary);
            position: relative;
            z-index: 10;
        }

        .top-right { margin-left: auto; display: flex; gap: 10px; }

        .btn { width: auto; padding: 10px 22px; margin-bottom: 0; text-align: center; }
        .btn-panic { color: var(--panic); }
        .btn-panic:hover { background: var(--panic); color: #fff; }

        #game-frame { 
            width: 100%; 
            height: calc(100% - 70px); 
            border: none; 
            background: transparent; 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transfer()">transfer</button>
    </div>

    <div id="main-ui" class="hidden">
        <div id="sidebar">
            <div class="brand">gelly</div>
            <div class="nav-items">
                <div class="nav-item active" onclick="tab('home', this)">home</div>
                <div class="nav-item" onclick="tab('games', this)">games</div>
                <div class="nav-item" onclick="tab('sounds', this)">soundboard</div>
            </div>
            <div class="sidebar-footer">v2.6</div>
        </div>

        <div class="viewport" id="viewport-main">
            <div id="home" class="section active">
                <h1>gelly</h1>
                <p>welcomewelcome to uhhh idk</p>
            </div>

            <div id="games" class="section">
                <span class="counter-label" id="game-count">loading games...</span>
                <div class="controls">
                    <input type="text" id="search" placeholder="search..." oninput="draw()">
                    <select id="sort" onchange="draw()">
                        <option value="az">a-z</option>
                        <option value="za">z-a</option>
                    </select>
                </div>
                <div class="grid" id="game-grid"></div>
            </div>

            <div id="sounds" class="section">
                <iframe src="soundboard/index.html"></iframe>
            </div>

            <div id="player">
                <div class="top-bar">
                    <button class="btn" onclick="closeGame()">back</button>
                    <div class="top-right">
                        <button class="btn btn-panic" onclick="panic()">panic</button>
                        <button class="btn" onclick="toggleFS()">fullscreen</button>
                    </div>
                </div>
                <iframe id="game-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" },
            { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" },
            { name: "doodle jump", id: "doodlejump", img: "doodlejumpicon.png" },
            { name: "drive mad", id: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" },
            { name: "flappy bird", id: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" },
            { name: "getting over it", id: "gettingoverit", img: "gettingoveriticon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", id: "redball", img: "redballicon.png" },
            { name: "run 3", id: "run3", img: "run3icon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" },
            { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" },
            { name: "tiny fishing", id: "tinyfishing", img: "tinyfishingicon.png" },
            { name: "vex 4", id: "vex4", img: "vex4icon.png" }
        ];

        function panic() {
            window.top.close();
            window.top.location.href = "about:blank";
        }

        function transfer() {
            const win = window.open();
            if (!win) return alert("allow popups to cloak");
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            win.document.body.style.background = '#0b0b0b';
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100%;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.appendChild(ifr);
            window.close();
        }

        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('main-ui').style.display = 'flex';
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function draw() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            const sort = document.getElementById('sort').value;
            const counter = document.getElementById('game-count');
            
            counter.innerText = `${gameData.length} games available`;

            let list = gameData.filter(g => g.name.includes(term));
            list.sort((a, b) => sort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            grid.innerHTML = '';
            list.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => {
                    document.getElementById('main-ui').classList.add('sidebar-hidden');
                    const player = document.getElementById('player');
                    player.classList.add('active');
                    document.getElementById('game-frame').src = `games/${g.id}/index.html`;
                };
                div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                grid.appendChild(div);
            });
        }

        function closeGame() {
            document.getElementById('main-ui').classList.remove('sidebar-hidden');
            document.getElementById('player').classList.remove('active');
            setTimeout(() => {
                document.getElementById('game-frame').src = '';
            }, 600);
        }

        function toggleFS() {
            let f = document.getElementById('game-frame');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
        }

        draw();
    </script>
</body>
</html>
