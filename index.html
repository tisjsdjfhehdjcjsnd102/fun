<!DOCTYPE html>
<html>
<head>
    <title>gelly</title>
    <style>
        /* Matches the #111 background of your dashboard */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #111; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Discreet Transfer button */
        .transfer-btn {
            position: fixed; 
            top: 20px; 
            left: 20px; 
            padding: 8px 15px;
            font-size: 14px; 
            color: #555; 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: sans-serif;
            z-index: 9999;
        }
        .transfer-btn:hover { background-color: #222; color: #888; }
    </style>
</head>
<body>

    <button class="transfer-btn" id="launchPortal">Transfer</button>

    <script>
        document.getElementById('launchPortal').onclick = function() {
            var win = window.open('about:blank', '_blank');
            var doc = win.document;

            var html = `
                <html>
                <head>
                    <title> </title>
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
                        
                        #sidebar { width: 220px; background: #1a1a1a; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #333; box-sizing: border-box; }
                        
                        .nav-group { display: flex; flex-direction: column; margin-bottom: 20px; }
                        
                        /* Menu buttons and Panic button styled the same */
                        .nav-btn { background: none; color: #aaa; border: none; padding: 12px 15px; text-align: left; cursor: pointer; font-size: 16px; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; font-family: sans-serif; }
                        .nav-btn:hover { background: #333; color: white; }
                        .nav-btn.active { background: #d3d3d3; color: #111; font-weight: bold; }
                        
                        /* Panic button specifically styled like menu options */
                        .panic-btn-menu { color: #aaa; margin-top: auto; margin-bottom: 10px; border: 1px solid transparent; }
                        .panic-btn-menu:hover { background: #d3d3d3; color: #111; }

                        .brand-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
                        .brand { font-size: 32px; font-weight: bold; color: #d3d3d3; letter-spacing: 2px; }
                        
                        .status-msg { font-size: 11px; color: #888; padding: 10px; background: #222; border-radius: 5px; border-left: 3px solid #d3d3d3; }

                        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
                        .page { display: none; padding: 40px; overflow-y: auto; height: 100%; box-sizing: border-box; }
                        .page.active { display: block; }
                        
                        .welcome-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
                        .welcome-text { font-size: 56px; font-weight: bold; margin-bottom: 10px; color: #d3d3d3; }
                        
                        #search { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 30px; outline: none; font-size: 16px; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
                        .game-card { background: #222; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
                        .game-card img { width: 110px; height: 110px; border-radius: 10px; object-fit: cover; }
                        
                        #player-container { display: none; width: 100%; height: 100%; background: #000; flex-direction: column; }
                        #player-nav { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
                        iframe { width: 100%; flex-grow: 1; border: none; }
                    </style>
                </head>
                <body>
                    <div id="sidebar">
                        <div class="nav-group">
                            <button class="nav-btn active" id="btn-home" onclick="showPage('home')">Home</button>
                            <button class="nav-btn" id="btn-games" onclick="showPage('games')">Games</button>
                            <button class="nav-btn" id="btn-sounds" onclick="showPage('sounds')">Sound Board</button>
                        </div>

                        <div class="brand-container">
                            <div class="brand">gelly</div>
                        </div>
                        
                        <button class="nav-btn panic-btn-menu" onclick="panicMode()">Panic</button>
                        <div class="status-msg">Monday Launch Ready!</div>
                    </div>

                    <div id="main-content">
                        <div id="home" class="page active">
                            <div class="welcome-container">
                                <div class="welcome-text">Welcome to gelly, have fun</div>
                            </div>
                        </div>
                        <div id="games" class="page">
                            <input type="text" id="search" placeholder="Search games..." onkeyup="filterGames()">
                            <div class="grid">
                                <div class="game-card" onclick="openFrame('./games/flappy/index.html')">
                                    <img src="./icons/flappybirdicon.png" alt="Flappy Bird"><p>Flappy Bird</p>
                                </div>
                                <div class="game-card" onclick="openFrame('./games/drivemad/index.html')">
                                    <img src="./icons/drivemadicon.png" alt="Drive Mad"><p>Drive Mad</p>
                                </div>
                                <div class="game-card" onclick="openFrame('./games/bitlife/index.html')">
                                    <img src="./icons/bitlifeicon.png" alt="BitLife"><p>BitLife</p>
                                </div>
                                <div class="game-card" onclick="openFrame('./games/geodash/index.html')">
                                    <img src="./icons/geodashicon.png" alt="Geometry Dash"><p>Geometry Dash</p>
                                </div>
                                <div class="game-card" onclick="openFrame('./games/tetris/index.html')">
                                    <img src="./icons/tetrisicon.png" alt="Tetris"><p>Tetris</p>
                                </div>
                            </div>
                        </div>
                        <div id="sounds" class="page">
                            <div class="welcome-container">
                                <h2 style="color:#d3d3d3">Soundboard</h2>
                                <button class="nav-btn" style="background:#d3d3d3; color:#111; padding: 20px 40px;" onclick="openFrame('./soundboard/index.html')">Open Soundboard</button>
                            </div>
                        </div>
                        <div id="player-container">
                            <div id="player-nav">
                                <button class="nav-btn" onclick="closeFrame()" style="background:#444; color:white">← Back</button>
                                <span style="font-weight:bold; color:#d3d3d3">gelly player</span>
                                <div style="display: flex; gap: 10px;">
                                    <button class="nav-btn" onclick="panicMode()" style="background:#333; margin:0; color:#aaa; border: 1px solid #444;">Panic</button>
                                    <button class="nav-btn" onclick="toggleFull()" style="background:#444; margin:0; color:white">Fullscreen</button>
                                </div>
                            </div>
                            <iframe id="game-frame" src=""></iframe>
                        </div>
                    </div>
                    <script>
                        function showPage(pageId) {
                            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                            document.getElementById('player-container').style.display = 'none';
                            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                            document.getElementById('btn-' + pageId).classList.add('active');
                            document.getElementById(pageId).classList.add('active');
                        }
                        function openFrame(url) {
                            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                            document.getElementById('player-container').style.display = 'flex';
                            document.getElementById('game-frame').src = url;
                        }
                        function closeFrame() {
                            document.getElementById('game-frame').src = '';
                            document.getElementById('player-container').style.display = 'none';
                            if (document.getElementById('btn-sounds').classList.contains('active')) { showPage('sounds'); } else { showPage('games'); }
                        }
                        function panicMode() { window.location.href = 'https://google.com'; }
                        function toggleFull() {
                            var frame = document.getElementById("game-frame");
                            if (frame.requestFullscreen) { frame.requestFullscreen(); }
                            else if (frame.webkitRequestFullscreen) { frame.webkitRequestFullscreen(); }
                        }
                        function filterGames() {
                            let input = document.getElementById('search').value.toLowerCase();
                            let cards = document.querySelectorAll('.game-card');
                            cards.forEach(card => {
                                let title = card.innerText.toLowerCase();
                                card.style.display = title.includes(input) ? "block" : "none";
                            });
                        }
                    <\/script>
                </body>
                </html>
            `;

            doc.write(html);
            doc.close();

            // Self-close the launcher
            window.open('', '_self', ''); 
            window.close();
        };
    </script>
</body>
</html>
