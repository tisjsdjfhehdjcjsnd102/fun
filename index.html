<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --secondary: #1e1e1e;
            --accent: #ffffff;
            --subtext: #777777;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            box-sizing: border-box; 
            text-transform: lowercase; 
            user-select: none; 
            outline: none; 
            -webkit-user-drag: none;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: #eeeeee; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        #landing { 
            height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: flex-start; 
            padding: 20px; background: #0b0b0b; position: fixed; z-index: 9999; 
        }
        
        .secret-wrapper { position: relative; display: flex; align-items: center; height: 42px; }

        #secret-container { 
            display: flex; align-items: center; transition: opacity 0.4s ease, transform 0.4s ease; 
        }
        #secret-container.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }

        #secret-input { 
            background: transparent; border: none; color: transparent; 
            font-family: inherit; font-size: 14px; width: 150px; 
            caret-color: transparent; cursor: default; padding: 0;
            position: absolute; left: 35px; z-index: 2;
        }

        #dot-display { 
            padding-left: 10px; display: flex; gap: 4px; pointer-events: none; 
            color: var(--subtext); font-weight: 900; font-size: 20px; 
            line-height: 0; margin-top: -2px; min-width: 20px;
        }

        .icon-unit {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            color: var(--subtext); opacity: 0.3; transition: var(--transition);
        }
        
        #check-btn { background: none; border: none; cursor: pointer; padding: 0; }
        #check-btn:hover { opacity: 1; color: var(--accent); }
        #check-btn svg, #secret-btn svg { width: 18px; height: 18px; fill: currentColor; }

        #secret-btn { 
            position: absolute; top: 5px; left: 0;
            background: none; border: none; border-radius: 8px;
            opacity: 0; transform: scale(0.8);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease; 
            visibility: hidden; pointer-events: none;
        }
        #secret-btn.active { 
            visibility: visible; pointer-events: all; opacity: 0.4; transform: scale(1);
        }
        #secret-btn.active:hover { opacity: 1; color: var(--accent); background: var(--secondary); }

        #navbar { height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="landing">
        <div class="secret-wrapper">
            <div id="secret-container">
                <button id="check-btn" class="icon-unit" onclick="checkCode()">
                    <svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                </button>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="secret-input" autocomplete="off" oninput="updateVisualDots()">
                    <div id="dot-display"></div>
                </div>
            </div>
            <button id="secret-btn" class="icon-unit" onclick="transfer()">
                <svg viewBox="0 0 24 24"><path d="M7,2V4H8V18A4,4 0 0,0 12,22A4,4 0 0,0 16,18V4H17V2H7M14,18A2,2 0 0,1 12,20A2,2 0 0,1 10,18V4H14V18Z"/></svg>
            </button>
        </div>
    </div>

    <div id="navbar">
        <div class="nav-left"><button class="nav-btn">home</button></div>
    </div>

    <div style="padding-top: 100px; padding-left: 60px;">
        <h1 style="font-size: 50px; font-weight: 900;">gelly v2.1.5</h1>
    </div>

    <script>
        // LOCKDOWN: Disable keyboard shortcuts for DevTools
        document.addEventListener('keydown', function(e) {
            if (
                e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || 
                (e.ctrlKey && e.key === "U")
            ) {
                e.preventDefault();
                return false;
            }
        });

        function focusInput() {
            document.getElementById('secret-input').focus();
        }

        window.onload = focusInput;

        document.getElementById('landing').addEventListener('click', () => {
            if (!document.getElementById('secret-btn').classList.contains('active')) {
                focusInput();
            }
        });

        function updateVisualDots() {
            const input = document.getElementById('secret-input');
            const display = document.getElementById('dot-display');
            display.innerText = ".".repeat(input.value.length);
        }

        function checkCode() {
            const input = document.getElementById('secret-input');
            if (input.value === "gg55") {
                document.getElementById('secret-container').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('secret-btn').classList.add('active');
                }, 400);
            } else {
                input.value = "";
                updateVisualDots();
            }
        }

        document.getElementById('secret-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkCode();
        });

        function transfer() {
            const win = window.open();
            if (!win) return;
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh; margin:0;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.style.margin = '0';
            win.document.body.appendChild(ifr);
            window.close();
        }

        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').style.display = 'none';
        }
    </script>
</body>
</html>
