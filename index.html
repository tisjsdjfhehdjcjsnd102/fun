<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --sidebar: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --sidebar: #f5f5f5;
            --card: #eeeeee;
            --accent: #000000;
            --secondary: #e0e0e0;
            --text: #111111;
            --subtext: #666666;
        }

        * { box-sizing: border-box; text-transform: lowercase; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
            cursor: default;
        }

        button, .nav-item, .game-card, .game-card *, select, .save-btn, .btn-action, .transfer-btn, .fav-btn, .filter-fav-btn {
            cursor: pointer !important;
        }

        #landing {
            height: 100vh; width: 100vw;
            display: flex; background: #0b0b0b;
            position: fixed; top: 0; left: 0;
            z-index: 9999;
        }

        .transfer-btn {
            position: absolute; top: 30px; left: 20px;
            padding: 12px 18px; background: transparent;
            border: none; color: var(--subtext);
            border-radius: 12px; font-size: 14px;
            font-weight: 600; transition: var(--transition);
            font-family: inherit;
        }
        
        .transfer-btn:hover {
            background: var(--secondary);
            color: var(--accent);
        }

        #main-ui {
            display: none; height: 100vh; width: 100vw;
            overflow: hidden; opacity: 0;
            transition: opacity 0.5s ease;
        }

        #sidebar {
            width: 260px; min-width: 260px;
            background: var(--sidebar); border-right: 1px solid var(--secondary);
            display: flex; flex-direction: column;
            padding: 30px 20px; transition: var(--transition);
            z-index: 10;
        }

        .sidebar-hidden #sidebar { margin-left: -260px; opacity: 0; }

        .brand { font-size: 24px; font-weight: 900; margin-bottom: 50px; padding-left: 10px; letter-spacing: -1px; color: var(--accent); }
        .nav-items { flex: 1; }
        .nav-item {
            padding: 12px 18px; margin-bottom: 8px; border-radius: 12px;
            color: var(--subtext); background: none; border: none;
            transition: var(--transition); font-weight: 600; text-align: left;
            font-size: 14px; display: block; width: 100%;
            font-family: inherit;
        }
        .nav-item:hover, .nav-item.active { background: var(--secondary); color: var(--accent); }
        
        .sidebar-footer { padding: 10px; font-size: 11px; color: #222; font-weight: 600; letter-spacing: 1px; }

        .viewport { flex: 1; height: 100vh; overflow-y: auto; position: relative; transition: var(--transition); }
        .section { display: none; animation: fadeIn 0.5s ease; height: 100%; position: relative; }
        .section.active { display: block; }
        
        #home, #settings { padding: 60px 80px; }
        #home h1, #settings h1 { font-size: 56px; font-weight: 900; margin-bottom: 35px; letter-spacing: -2px; }

        #games { padding: 40px; }
        .counter-label { font-size: 12px; color: var(--subtext); font-weight: 600; margin-bottom: 15px; padding-left: 5px; display: block; }
        
        /* CONTROLS LAYOUT */
        .controls { display: flex; gap: 10px; margin-bottom: 50px; align-items: center; }
        input, select, .filter-fav-btn { 
            background: var(--secondary); border: none; color: var(--text); 
            padding: 12px 20px; border-radius: 12px; outline: none; 
            font-family: inherit; height: 45px;
        }
        #search { flex: 1; }

        .filter-fav-btn {
            display: flex; align-items: center; justify-content: center;
            min-width: 45px; transition: var(--transition);
        }
        .filter-fav-btn.active { background: var(--accent); color: var(--bg); }
        .filter-fav-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .filter-fav-btn.active svg { fill: currentColor; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        
        .game-card { 
            background: var(--card); border-radius: 18px; padding: 10px; 
            transition: var(--transition); text-align: center; position: relative;
        }
        .game-card:hover { transform: scale(1.03); background: var(--secondary); }
        .game-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; object-fit: cover; }
        
        .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
        .game-card span { font-size: 12px; color: var(--subtext); font-weight: 600; text-align: left; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .fav-btn { background: none; border: none; padding: 5px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-icon { width: 16px; height: 16px; fill: none; stroke: var(--subtext); stroke-width: 2.5; transition: var(--transition); }
        .fav-btn.active .fav-icon { fill: var(--accent); stroke: var(--accent); }

        #player {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 20; opacity: 0; transition: opacity 0.5s var(--transition);
        }
        #player.active { display: block; opacity: 1; }
        .top-bar { height: 70px; display: flex; align-items: center; padding: 0 20px; background: var(--sidebar); border-bottom: 1px solid var(--secondary); }
        .btn-action { padding: 10px 20px; border-radius: 10px; background: none; border: 1px solid var(--secondary); color: var(--subtext); font-weight: 600; transition: var(--transition); font-family: inherit; }

        /* SETTINGS SPECIFICS */
        .settings-group { max-width: 500px; margin-bottom: 30px; display: flex; flex-direction: column; }
        .settings-label { color: var(--subtext); font-size: 12px; font-weight: 600; margin-bottom: 12px; padding-left: 5px; }
        .save-btn { background: var(--secondary); color: #ffffff; border: none; border-radius: 12px; padding: 12px 25px; font-weight: 600; transition: var(--transition); }
        .save-btn:hover { background: var(--accent); color: var(--bg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transfer()">transfer</button>
    </div>

    <div id="main-ui">
        <div id="sidebar">
            <div class="brand">gelly</div>
            <div class="nav-items">
                <button class="nav-item active" onclick="tab('home', this)">home</button>
                <button class="nav-item" onclick="tab('games', this)">games</button>
                <button class="nav-item" onclick="tab('sounds', this)">soundboard</button>
                <button class="nav-item" onclick="tab('settings', this)">settings</button>
            </div>
            <div class="sidebar-footer">v4.0</div>
        </div>

        <div class="viewport">
            <div id="home" class="section active">
                <h1>gelly</h1>
                <p>welcome to uhhh i forgot sorry</p>
            </div>

            <div id="games" class="section">
                <span class="counter-label" id="game-count">loading...</span>
                <div class="controls">
                    <input type="text" id="search" placeholder="search..." oninput="draw()">
                    <button id="fav-toggle" class="filter-fav-btn" onclick="toggleFavFilter()" title="show favorites">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </button>
                    <select id="sort" onchange="updateSort(this.value)">
                        <option value="az">a-z</option>
                        <option value="za">z-a</option>
                    </select>
                </div>
                <div class="grid" id="game-grid"></div>
            </div>

            <div id="sounds" class="section">
                <iframe id="sound-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
            </div>

            <div id="settings" class="section">
                <h1>settings</h1>
                <div class="settings-group">
                    <span class="settings-label">theme</span>
                    <select id="theme-select" onchange="previewTheme(this.value)">
                        <option value="dark">dark</option>
                        <option value="light">light</option>
                    </select>
                </div>
                <div class="settings-group">
                    <span class="settings-label">panic url</span>
                    <input type="text" id="panic-input" placeholder="https://google.com">
                </div>
                <button class="save-btn" onclick="saveSettings()">save settings</button>
            </div>

            <div id="player">
                <div class="top-bar">
                    <button class="btn-action" onclick="closeGame()">back</button>
                </div>
                <iframe id="game-frame" src="" style="width:100%; height:calc(100% - 70px); border:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" },
            { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" },
            { name: "doodle jump", id: "doodlejump", img: "doodlejumpicon.png" },
            { name: "drive mad", id: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" },
            { name: "eggy car", id: "eggycar", img: "eggycaricon.png" },
            { name: "flappy bird", id: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" },
            { name: "getting over it", id: "gettingoverit", img: "gettingoveriticon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", id: "redball", img: "redballicon.png" },
            { name: "run 3", id: "run3", img: "run3icon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" },
            { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" },
            { name: "tiny fishing", id: "tinyfishing", img: "tinyfishingicon.png" },
            { name: "vex 4", id: "vex4", img: "vex4icon.png" }
        ];

        let favorites = JSON.parse(localStorage.getItem('gelly-favs')) || [];
        let currentSort = localStorage.getItem('gelly-sort') || 'az';
        let favFilterActive = localStorage.getItem('gelly-fav-filter') === 'true';

        function init() {
            document.getElementById('panic-input').value = localStorage.getItem('gelly-panic') || 'https://google.com';
            const theme = localStorage.getItem('gelly-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-select').value = theme;
            updateSoundboard(theme);
            if(favFilterActive) document.getElementById('fav-toggle').classList.add('active');
            draw();
        }

        function updateSort(val) {
            currentSort = val;
            localStorage.setItem('gelly-sort', val);
            draw();
        }

        function toggleFavFilter() {
            favFilterActive = !favFilterActive;
            localStorage.setItem('gelly-fav-filter', favFilterActive);
            document.getElementById('fav-toggle').classList.toggle('active');
            draw();
        }

        function toggleFav(id, event) {
            event.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('gelly-favs', JSON.stringify(favorites));
            draw();
        }

        function draw() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            document.getElementById('sort').value = currentSort;

            let list = gameData.filter(g => g.name.includes(term));

            if (favFilterActive) {
                list = list.filter(g => favorites.includes(g.id));
            }

            if (currentSort === 'az') {
                list.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                list.sort((a, b) => b.name.localeCompare(a.name));
            }

            document.getElementById('game-count').innerText = `${list.length} games available`;
            grid.innerHTML = '';

            list.forEach(g => {
                const isFav = favorites.includes(g.id);
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => {
                    document.getElementById('main-ui').classList.add('sidebar-hidden');
                    document.getElementById('player').classList.add('active');
                    document.getElementById('game-frame').src = `games/${g.id}/index.html`;
                };
                div.innerHTML = `
                    <img src="icons/${g.img}">
                    <div class="card-footer">
                        <span>${g.name}</span>
                        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${g.id}', event)">
                            <svg class="fav-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function previewTheme(t) { document.documentElement.setAttribute('data-theme', t); }

        function saveSettings() {
            localStorage.setItem('gelly-theme', document.getElementById('theme-select').value);
            localStorage.setItem('gelly-panic', document.getElementById('panic-input').value);
            updateSoundboard(document.getElementById('theme-select').value);
            alert("settings saved");
        }

        function updateSoundboard(theme) {
            const path = theme === 'light' ? 'soundboardlight' : 'soundboarddark';
            document.getElementById('sound-frame').src = `${path}/index.html`;
        }

        function transfer() {
            const win = window.open();
            if (!win) return alert("allow popups");
            win.document.body.style.margin = '0';
            win.document.body.style.background = '#0b0b0b';
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.appendChild(ifr);
            window.close();
        }

        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            setTimeout(() => { document.getElementById('main-ui').style.opacity = '1'; }, 50);
        }

        function closeGame() {
            document.getElementById('main-ui').classList.remove('sidebar-hidden');
            document.getElementById('player').classList.remove('active');
            setTimeout(() => { document.getElementById('game-frame').src = ''; }, 600);
        }

        init();
    </script>
</body>
</html>
