<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --sidebar: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --sidebar: #f5f5f5;
            --card: #eeeeee;
            --accent: #000000;
            --secondary: #e0e0e0;
            --text: #111111;
            --subtext: #666666;
        }

        * {
            box-sizing: border-box;
            text-transform: lowercase;
            cursor: default;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        button, .nav-item, .game-card, .game-card *, select, input {
            cursor: pointer;
        }
        input[type="text"] { cursor: text; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #landing {
            height: 100vh;
            width: 100vw;
            display: flex;
            background: #0b0b0b;
            position: fixed;
            z-index: 9999;
        }

        .transfer-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: none;
            border: 1px solid transparent;
            color: #777;
            border-radius: 12px;
            font-size: 13px;
            transition: var(--transition);
        }

        #main-ui {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--secondary);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            transition: var(--transition);
            z-index: 10;
        }

        .sidebar-hidden #sidebar {
            margin-left: -260px;
            opacity: 0;
        }

        .brand {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 50px;
            padding-left: 10px;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .nav-items { flex: 1; }

        .nav-item {
            padding: 12px 18px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--subtext);
            background: none;
            border: none;
            transition: var(--transition);
            font-weight: 600;
            text-align: left;
            font-size: 14px;
            display: block;
            width: 100%;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--secondary);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 10px;
            font-size: 11px;
            color: #222;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .viewport {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            transition: var(--transition);
        }

        .section { display: none; animation: fadeIn 0.5s ease; height: 100%; position: relative; }
        .section.active { display: block; }
        
        #home, #settings { padding: 60px 80px; }
        #home h1, #settings h1 { font-size: 56px; font-weight: 900; margin-bottom: 35px; letter-spacing: -2px; }
        #home p { color: var(--subtext); font-size: 18px; margin-left: 4px; }

        #games { padding: 40px; }

        .counter-label {
            font-size: 12px;
            color: var(--subtext);
            font-weight: 600;
            margin-bottom: 15px;
            padding-left: 5px;
            display: block;
        }

        .controls { display: flex; gap: 15px; margin-bottom: 50px; }

        input, select {
            background: var(--secondary);
            border: none;
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
        }

        #search { flex: 1; }

        /* FIXED SETTINGS GROUPS */
        .settings-group {
            max-width: 500px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column; /* Label on top, input on bottom */
        }
        
        .settings-label {
            color: var(--subtext);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .settings-footer {
            position: absolute;
            bottom: 40px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .settings-footer.visible {
            opacity: 1;
            pointer-events: all;
        }

        .warning-text {
            color: var(--panic);
            font-size: 13px;
            font-weight: 600;
        }

        .save-btn {
            background: var(--secondary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            font-family: inherit;
            transition: var(--transition);
        }

        .save-btn:hover { background: var(--accent); color: var(--bg); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card);
            border-radius: 18px;
            padding: 10px;
            transition: var(--transition);
            text-align: center;
        }

        .game-card:hover { transform: scale(1.03); background: var(--secondary); }
        .game-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; object-fit: cover; }
        .game-card span { font-size: 12px; color: var(--subtext); font-weight: 600; }

        #player {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s var(--transition);
        }

        #player.active { display: block; opacity: 1; }

        .top-bar {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--secondary);
        }

        .top-right { margin-left: auto; display: flex; gap: 10px; }
        .btn-panic { color: var(--panic); border: 1px solid transparent; }
