<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelly Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #7c4dff;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Landing Screen --- */
        #landing {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #0f0f0f, #1a1a1a);
        }

        .transfer-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* --- Main UI --- */
        #main-ui { display: none; padding-top: 70px; }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        nav button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        nav button:hover, nav button.active { color: var(--accent); }

        .panic-btn { color: #ff4d4d !important; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* --- Games Grid --- */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #search {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
        }

        #filter {
            padding: 10px;
            background: #222;
            color: white;
            border-radius: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover { transform: translateY(-5px); border: 1px solid var(--accent); }

        .game-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; aspect-ratio: 1/1; object-fit: cover; }

        /* --- Game Player --- */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
        }

        .player-bar {
            height: 50px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        iframe { width: 100%; height: calc(100% - 50px); border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transferSite()">Transfer</button>
        <h1>Welcome to Gelly</h1>
    </div>

    <div id="main-ui">
        <nav>
            <button onclick="showSection('home')">Home</button>
            <button onclick="showSection('games')">Games</button>
            <button onclick="showSection('soundboard')">Soundboard</button>
            <button class="panic-btn" onclick="panic()">Panic</button>
        </nav>

        <div class="container">
            <section id="home-sec">
                <h1 style="color: var(--accent);">Gelly</h1>
                <p>Welcome to Gelly. Your central hub for games and sounds, built for speed and privacy. Use the navigation bar above to explore.</p>
            </section>

            <section id="games-sec" class="hidden">
                <div class="controls">
                    <input type="text" id="search" placeholder="Search games..." oninput="renderGames()">
                    <select id="filter" onchange="renderGames()">
                        <option value="az">A-Z</option>
                        <option value="za">Z-A</option>
                    </select>
                </div>
                <div class="grid" id="game-grid"></div>
            </section>

            <section id="soundboard-sec" class="hidden">
                <iframe src="soundboard/index.html" style="height: 80vh; border-radius: 15px;"></iframe>
            </section>
        </div>
    </div>

    <div id="player-overlay">
        <div class="player-bar">
            <button onclick="closeGame()">← Back</button>
            <button onclick="toggleFS()">Fullscreen</button>
            <button class="panic-btn" onclick="panic()">Panic</button>
            <span id="game-title" style="margin-left: auto; font-weight: bold;"></span>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const games = [
            { name: "2048", folder: "2048", icon: "icons/2048icon.png" },
            { name: "Bitlife", folder: "bitlife", icon: "icons/bitlifeicon.png" },
            { name: "Cookie Clicker", folder: "cookieclicker", icon: "icons/cookieclickericon.png" },
            { name: "Crossy Road", folder: "crossyroad", icon: "icons/crossyroadicon.png" },
            { name: "Dino Game", folder: "dinogame", icon: "icons/dinogameicon.png" },
            { name: "Doodle Jump", folder: "doodlejump", icon: "icons/doodlejumpicon.png" },
            { name: "Drive Mad", folder: "drivemad", icon: "icons/drivemadicon.png" },
            { name: "Duck Life", folder: "ducklife", icon: "icons/ducklifeicon.png" },
            { name: "Flappy Bird", folder: "flappy", icon: "icons/flappybirdicon.png" },
            { name: "Geometry Dash", folder: "geodash", icon: "icons/geodashicon.png" },
            { name: "Minecraft", folder: "minecraft", icon: "icons/minecrafticon.png" },
            { name: "Paper.io 2", folder: "paperio2", icon: "icons/paperio2icon.png" },
            { name: "Red Ball", folder: "redball", icon: "icons/redballicon.png" },
            { name: "Run 3", folder: "run3", icon: "icons/run3icon.png" },
            { name: "Slope", folder: "slope", icon: "icons/slopeicon.png" },
            { name: "Stickman Hook", folder: "stickmanhook", icon: "icons/stickmanhookicon.png" },
            { name: "Tetris", folder: "tetris", icon: "icons/tetrisicon.png" },
            { name: "Vex 4", folder: "vex4", icon: "icons/vex4icon.png" }
        ];

        function transferSite() {
            // This opens the current site inside a blank page
            const url = window.location.href;
            const win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            const iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.src = url;
            win.document.body.appendChild(iframe);
            
            // Show the main UI in the original window too
            document.getElementById('landing').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        function showSection(id) {
            document.getElementById('home-sec').classList.add('hidden');
            document.getElementById('games-sec').classList.add('hidden');
            document.getElementById('soundboard-sec').classList.add('hidden');
            document.getElementById(id + '-sec').classList.remove('hidden');
        }

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const search = document.getElementById('search').value.toLowerCase();
            const sort = document.getElementById('filter').value;
            
            let filtered = games.filter(g => g.name.toLowerCase().includes(search));
            
            if (sort === 'az') filtered.sort((a, b) => a.name.localeCompare(b.name));
            else filtered.sort((a, b) => b.name.localeCompare(a.name));

            grid.innerHTML = '';
            filtered.forEach(game => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => openGame(game);
                div.innerHTML = `
                    <img src="${game.icon}" alt="${game.name}">
                    <div>${game.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function openGame(game) {
            document.getElementById('player-overlay').style.display = 'block';
            document.getElementById('game-frame').src = `games/${game.folder}/index.html`;
            document.getElementById('game-title').innerText = game.name;
        }

        function closeGame() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function panic() {
            window.location.href = 'https://classroom.google.com';
        }

        function toggleFS() {
            const frame = document.getElementById('game-frame');
            if (frame.requestFullscreen) frame.requestFullscreen();
        }

        // Initial Load
        renderGames();
    </script>
</body>
</html>
