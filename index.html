<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card: #121212;
            --accent: #00ff88;
            --text: #ffffff;
            --subtext: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* --- Landing Screen --- */
        #landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .transfer-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #333;
            border-radius: 6px;
            color: var(--subtext);
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .transfer-btn:hover { border-color: var(--accent); color: var(--text); }

        h1.logo { font-size: 80px; font-weight: 900; letter-spacing: -4px; margin: 0; }

        /* --- Main App UI --- */
        #app-ui { display: none; height: 100vh; flex-direction: column; }

        nav {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border-bottom: 1px solid #1a1a1a;
            background: #080808;
        }

        nav button {
            background: none;
            border: none;
            color: var(--subtext);
            font-weight: 700;
            cursor: pointer;
            text-transform: lowercase;
            font-size: 16px;
        }

        nav button:hover { color: var(--accent); }
        .panic-link { color: #ff4444 !important; }

        .content-area { flex: 1; overflow-y: auto; padding: 40px 20px; }

        /* --- Games Section --- */
        .search-bar {
            max-width: 800px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
        }

        #game-search {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid #222;
            background: #111;
            color: white;
            outline: none;
        }

        #sort-filter {
            padding: 10px;
            background: #111;
            color: white;
            border: 1px solid #222;
            border-radius: 12px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .game-item {
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .game-item:hover { transform: translateY(-5px); }

        .game-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        .game-item span { font-weight: 600; font-size: 14px; color: var(--subtext); }

        /* --- Player Overlay --- */
        #player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
        }

        .player-nav {
            height: 50px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .player-nav button {
            background: #1a1a1a;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        iframe { width: 100%; height: calc(100% - 50px); border: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transfer()">transfer</button>
        <h1 class="logo">gelly</h1>
        <p style="color: var(--subtext);">press transfer to start</p>
    </div>

    <div id="app-ui">
        <nav>
            <button onclick="tab('home')">home</button>
            <button onclick="tab('games')">games</button>
            <button onclick="tab('soundboard')">soundboard</button>
            <button class="panic-link" onclick="panic()">panic</button>
        </nav>

        <div class="content-area">
            <div id="home-pg">
                <h2 style="font-size: 40px; color: var(--accent);">gelly</h2>
                <p style="max-width: 500px; line-height: 1.6; color: var(--subtext);">
                    a simple, clean web directory for games and tools. 
                    no tracking, no fluff, just gelly.
                </p>
            </div>

            <div id="games-pg" class="hidden">
                <div class="search-bar">
                    <input type="text" id="game-search" placeholder="search games..." oninput="drawGames()">
                    <select id="sort-filter" onchange="drawGames()">
                        <option value="az">a-z</option>
                        <option value="za">z-a</option>
                    </select>
                </div>
                <div class="game-grid" id="grid"></div>
            </div>

            <div id="soundboard-pg" class="hidden">
                <iframe src="soundboard/index.html" style="height: 70vh; border-radius: 20px;"></iframe>
            </div>
        </div>
    </div>

    <div id="player">
        <div class="player-nav">
            <button onclick="closeGame()">back</button>
            <button onclick="toggleFS()">fullscreen</button>
            <button onclick="panic()" style="color: #ff4444;">panic</button>
            <span id="active-title" style="margin-left: auto; font-weight: bold; color: var(--accent);"></span>
        </div>
        <iframe id="game-view" src=""></iframe>
    </div>

    <script>
        const catalog = [
            { name: "2048", slug: "2048", img: "2048icon.png" },
            { name: "bitlife", slug: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", slug: "cookieclicker", img: "cookieclickericon.png" },
            { name: "crossy road", slug: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", slug: "dinogame", img: "dinogameicon.png" },
            { name: "doodle jump", slug: "doodlejump", img: "doodlejumpicon.png" },
            { name: "drive mad", slug: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", slug: "ducklife", img: "ducklifeicon.png" },
            { name: "flappy bird", slug: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", slug: "geodash", img: "geodashicon.png" },
            { name: "minecraft", slug: "minecraft", img: "minecrafticon.png" },
            { name: "paper.io 2", slug: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", slug: "redball", img: "redballicon.png" },
            { name: "run 3", slug: "run3", img: "run3icon.png" },
            { name: "slope", slug: "slope", img: "slopeicon.png" },
            { name: "stickman hook", slug: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", slug: "tetris", img: "tetrisicon.png" },
            { name: "vex 4", slug: "vex4", img: "vex4icon.png" }
        ];

        function transfer() {
            let win = window.open();
            if (!win) {
                alert("Pop-up blocked! Allow pop-ups to use about:blank mode.");
                initUI();
                return;
            }
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            let ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100%;";
            ifr.src = window.location.href;
            win.document.body.appendChild(ifr);
            window.location.replace("https://classroom.google.com");
        }

        function initUI() {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('app-ui').style.display = 'flex';
        }

        if (window.self !== window.top) initUI();

        function tab(name) {
            ['home-pg', 'games-pg', 'soundboard-pg'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(name + '-pg').classList.remove('hidden');
        }

        function drawGames() {
            const grid = document.getElementById('grid');
            const query = document.getElementById('game-search').value.toLowerCase();
            const sort = document.getElementById('sort-filter').value;

            let list = catalog.filter(g => g.name.toLowerCase().includes(query));
            list.sort((a, b) => sort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));

            grid.innerHTML = '';
            list.forEach(g => {
                const el = document.createElement('div');
                el.className = 'game-item';
                el.onclick = () => {
                    document.getElementById('player').style.display = 'block';
                    document.getElementById('game-view').src = `games/${g.slug}/index.html`;
                    document.getElementById('active-title').innerText = g.name;
                };
                el.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                grid.appendChild(el);
            });
        }

        function closeGame() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('game-view').src = '';
        }

        function panic() { window.location.href = "https://classroom.google.com"; }
        
        function toggleFS() {
            const v = document.getElementById('game-view');
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        }

        drawGames();
    </script>
</body>
</html>
