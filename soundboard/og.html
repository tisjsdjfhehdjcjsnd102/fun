<!DOCTYPE html>
<html>
<head>
    <title>Gelly Soundboard</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: #eee; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 60px; 
            padding-bottom: 100px; /* Space for bottom buttons */
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 64px; 
            font-weight: 800; 
            letter-spacing: -2px; 
            margin: 0 0 10px 0;
            color: #fff;
        }

        .status-header {
            font-size: 11px; 
            color: #333; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 40px;
            display: block;
        }

        /* Fixed Controls at Bottom Right */
        .controls { 
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex; 
            gap: 10px;
            z-index: 1000;
        }

        .gelly-btn { 
            background: #151515; 
            color: #888; 
            border: 1px solid #222; 
            padding: 12px 20px; 
            cursor: pointer; 
            font-size: 13px; 
            border-radius: 10px; 
            transition: all 0.3s ease; 
            font-weight: 600;
            font-family: inherit;
            text-transform: lowercase; /* Forces lowercase */
        }

        .gelly-btn:hover { 
            background: #eee; 
            color: #111; 
            border-color: #fff;
        }

        /* The Grid - Fixed to ensure loader.js buttons show up */
        .soundboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* This targets the buttons created by loader.js */
        .soundboard-container button, .sound-button {
            background: #151515 !important;
            padding: 20px 10px !important;
            border-radius: 15px !important;
            text-align: center !important;
            cursor: pointer !important;
            border: 1px solid #222 !important;
            transition: all 0.4s ease !important;
            color: #bbb !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            font-family: inherit !important;
            min-height: 80px !important;
            display: inline-block; /* Ensure they aren't hidden */
        }

        .soundboard-container button:hover { 
            transform: translateY(-5px); 
            background: #1c1c1c !important; 
            border-color: #333 !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

    <h1>gelly soundboard.</h1>
    <span class="status-header">v2.0 // audio engine online</span>

    <div class="soundboard-container" id="soundboard">
        <!-- loader.js will inject buttons here -->
    </div>

    <div class="controls">
        <button class="gelly-btn" onclick="stopAll()">stop all</button>
        <button class="gelly-btn" onclick="playAll()">chaos mode</button>
    </div>

    <script src="loader.js"></script>
    <script>
        // Fix for Chaos Mode to play EVERYTHING
        function playAll() {
            const sounds = document.querySelectorAll('audio');
            sounds.forEach(s => {
                s.currentTime = 0;
                s.play();
            });
        }

        function stopAll() {
            const sounds = document.querySelectorAll('audio');
            sounds.forEach(s => {
                s.pause();
                s.currentTime = 0;
            });
        }
    </script>
</body>
</html>
