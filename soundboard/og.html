<!DOCTYPE html>
<html>
<head>
    <title>Gelly Soundboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: #eee; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            font-size: 42px; 
            font-weight: 800; 
            letter-spacing: -2px; 
            margin-bottom: 10px; 
            color: #fff;
        }

        h2 { 
            font-size: 14px; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 40px; 
            font-weight: 500;
        }

        /* Controls in a straight line */
        .control { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 50px; 
            padding: 20px;
            background: #121212;
            border: 1px solid #222;
            border-radius: 15px;
        }

        .woah { 
            background: #1d1d1d; 
            color: #888; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s;
            font-family: inherit;
        }

        .woah:hover { background: #eee; color: #111; }

        /* The Grid for sounds */
        .soundboard-container { 
            width: 100%; 
            max-width: 1000px; 
        }

        .flex-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
        }

        /* Styling the auto-generated buttons from loader.js */
        button.sound-button {
            background: #151515;
            color: #bbb;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-family: inherit;
        }

        button.sound-button:hover {
            background: #1c1c1c;
            color: #fff;
            border-color: #333;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <h1>gelly soundboard.</h1>
    <h2>Audio Engine Active</h2>

    <div class="control">
        <button class="woah" onclick="playAll()">Chaos Mode</button>
        <button class="woah" onclick="stopAll()">Mute All</button>
    </div>

    <div class="soundboard-container">
        <div class="flex-container" id="sound-grid">
            <!-- loader.js will automatically put buttons here -->
        </div>
    </div>

    <script type="application/javascript" src="loader.js"></script>
</body>
</html>
