<!DOCTYPE html>
<html>
<head>
    <title>Gelly Soundboard</title>
    <style>
        /* Exact match for Gelly Dashboard Theme */
        body { 
            background-color: #0b0b0b; 
            color: #eee; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 60px; 
            overflow-y: auto; 
            height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 64px; 
            font-weight: 800; 
            letter-spacing: -2px; 
            margin: 0 0 10px 0;
            color: #fff;
        }

        .status-header {
            font-size: 11px; 
            color: #333; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 40px;
            display: block;
        }

        /* Nav Group Style Controls */
        .controls { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 40px;
        }

        .gelly-btn { 
            background: transparent; 
            color: #888; 
            border: 1px solid #222; 
            padding: 12px 24px; 
            cursor: pointer; 
            font-size: 15px; 
            border-radius: 10px; 
            transition: all 0.3s ease; 
            font-weight: 500;
            font-family: inherit;
        }

        .gelly-btn:hover { 
            background: #1d1d1d; 
            color: #fff; 
            border-color: #333;
        }

        /* Sound Button Grid - Matches your Game Grid */
        .soundboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
        }

        /* This targets the buttons created by loader.js */
        button {
            background: #151515;
            padding: 25px 15px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #222;
            transition: all 0.4s ease;
            color: #bbb;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        button:hover { 
            transform: translateY(-10px); 
            background: #1c1c1c; 
            border-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>gelly soundboard.</h1>
    <span class="status-header">v2.0 // Audio Engine Online</span>

    <div class="controls">
        <button class="gelly-btn" onclick="stopAll()">Stop All</button>
        <button class="gelly-btn" onclick="playAll()">Chaos Mode</button>
    </div>

    <!-- The loader.js targets the container to inject buttons -->
    <div class="soundboard-container">
        <!-- Buttons will appear here -->
    </div>

    <script src="loader.js"></script>
</body>
</html>
