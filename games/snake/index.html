<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Snake</title>
    <style>
        /* Forces the game to be centered and clean on your dashboard */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0b; /* Matches your dashboard */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Styles the game frame to fill the area correctly */
        #snake-frame {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- This uses a clean, ad-free mirror of the Google Snake engine -->
    <iframe 
        id="snake-frame" 
        src="https://googlemaps.com" 
        scrolling="no" 
        frameborder="0" 
        allowfullscreen="true">
    </iframe>

</body>
</html>
