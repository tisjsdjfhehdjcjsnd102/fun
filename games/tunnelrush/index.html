<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://w3.org">
<html>
<head>
<meta charset="UTF-8"/>
<title>Tunnel Rush</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<style type="text/css">
  body {
      margin: 0;
      background-color: black;
      overflow: hidden;
  }
  .game {
      position: absolute;
      top: 0px;
      left: 0px;
      margin: 0px;
      border: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: block;
  }
</style>
</head>

<body style="background:black">
  <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <script type="text/javascript">
    var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
            return function(text) {
                text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
            };
        })(),
        printErr: function(text) {
            text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            canvas.addEventListener("webglcontextlost", function(e) { e.preventDefault(); }, false);
            return canvas;
        })(),
        setStatus: function(text) { },
        monitorRunDependencies: function(left) { },
    };
    window.onerror = function(event) {
        console.log("onerror: " + event.message);
    };
  </script>

  <!-- ONLY the actual game logic script remains -->
  <script async="false" type="text/javascript" src="moonbird.js"></script>

  <!-- ALL SCAM REDIRECT AND AD SCRIPTS HAVE BEEN REMOVED -->
</body>
</html>
