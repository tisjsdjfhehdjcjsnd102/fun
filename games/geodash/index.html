<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Geometry Dash Lite</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        #gameContainer { width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #loader {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #000; z-index: 99;
        }
        .progress {
            margin: 1.5em auto; width: 400px; height: 20px;
            background: #222; border-radius: 10px; position: relative;
            overflow: hidden; display: none;
        }
        .full {
            width: 100%; height: 100%; background: #0f66ff;
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.2s;
        }
        .logo { max-width: 80%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    
    <div id="loader">
        <img class="logo" src="./image/loading.png">
        <div class="progress">
            <div class="full"></div>
        </div>
    </div>

    <script src="./Build/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "./Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const loader = document.querySelector("#loader");
            const progressBar = document.querySelector(".progress");
            const fullBar = document.querySelector(".full");
            
            progressBar.style.display = "block";
            fullBar.style.transform = `scaleX(${progress})`;
            
            if (progress === 1) {
                setTimeout(() => { loader.style.display = "none"; }, 1500);
            }
        }
    </script>
</body>
</html>
