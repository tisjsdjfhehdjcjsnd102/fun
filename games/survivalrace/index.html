<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Survival Rate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/z-f3-f1/1@main/style.css">
    <style>
        canvas:focus { outline: none; }
        html, body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            height: 100%;
            background: #000;
        }
        #unity-container { width: 100%; height: 100%; }
        #unity-canvas { width: 100%; height: 100%; background: #231f20; }
        
        /* Ad Styles */
        #ad-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(728px, calc(100% - 20px));
            height: 90px;
            background: rgba(0, 0, 0, 0.90);
            display: none;
            z-index: 99999;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
            transition: transform 0.5s ease-in-out;
        }
        #ad-container.hidden { transform: translate(-50%, -100%); }
        #ad-iframe { width: 745px; height: 90px; border: 0; }
        #close-ad {
            position: absolute;
            top: 6px;
            right: 8px;
            background: #ff4d4d;
            color: #fff;
            border: none;
            padding: 5px 9px;
            font-size: 13px;
            border-radius: 4px;
            cursor: not-allowed;
            opacity: 0.72;
            display: flex;
            align-items: center;
        }
        #close-ad.enabled { cursor: pointer; opacity: 1; }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="loading-cover" style="position:fixed; top:0; left:0; width:100%; height:100%; background: url('https://cdn.jsdelivr.net/gh/z-f3-f1/1@main/background.jpg') center / cover; display: flex; justify-content: center; align-items: center;">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="https://cdn.jsdelivr.net/gh/z-f3-f1/1@main/logo.png" style="width: 200px;"></div>
            <div id="unity-progress-bar-empty" style="width: 200px; height: 10px; background: rgba(255,255,255,0.2); margin-top: 20px;">
                <div id="unity-progress-bar-full" style="width: 0%; height: 100%; background: #fff;"></div>
            </div>
        </div>
    </div>

    <div id="ad-container">
        <iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbzA6GNdpfUShkCh6apD0D21YAUf7A5d3Guhq2PayqLbk_5XG_wQhy0bdYzKJWLhzgMVMQ/exec" scrolling="no" frameborder="0"></iframe>
        <button id="close-ad">Close</button>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/z-f3-f1/1@main/Build/yandexBrotli.loader.js"></script>
    <script>
        const buildUrl = "https://cdn.jsdelivr.net/gh/z-f3-f1/1@main/Build";
        const config = {
            dataUrl: buildUrl + "/yandexBrotli.data.br",
            frameworkUrl: buildUrl + "/yandexBrotli.framewor.js",
            codeUrl: "", // Will be set by blob merge
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Brain massage",
            productName: "Survival Rate",
            productVersion: "0.0.197"
        };

        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");

        // Merge WASM parts
        function loadAndMergeFiles(files, callback) {
            var mergedBlob = [];
            let loadedCount = 0;
            files.forEach((file, index) => {
                fetch(buildUrl + "/" + file)
                    .then(res => res.arrayBuffer())
                    .then(data => {
                        mergedBlob[index] = new Uint8Array(data);
                        loadedCount++;
                        if (loadedCount === files.length) callback(new Blob(mergedBlob));
                    });
            });
        }

        const wasmFiles = ["yandexBrotli.wasm.br.part1", "yandexBrotli.wasm.br.part2"];

        loadAndMergeFiles(wasmFiles, function (blob) {
            config.codeUrl = URL.createObjectURL(blob);
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingCover.style.display = "none";
            }).catch((message) => {
                alert(message);
            });
        });

        // Ad Logic
        (function () {
            const adContainer = document.getElementById('ad-container');
            const closeBtn = document.getElementById('close-ad');

            function showAd() {
                adContainer.style.display = 'block';
                adContainer.classList.remove('hidden');
                let timeLeft = 12;
                closeBtn.disabled = true;
                closeBtn.classList.remove('enabled');
                
                const timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        closeBtn.textContent = `Close (${timeLeft})`;
                    } else {
                        clearInterval(timer);
                        closeBtn.disabled = false;
                        closeBtn.classList.add('enabled');
                        closeBtn.textContent = 'Close ↑';
                    }
                }, 1000);
            }

            setTimeout(showAd, 2000);
            closeBtn.addEventListener('click', () => {
                if (!closeBtn.disabled) {
                    adContainer.classList.add('hidden');
                    setTimeout(showAd, 25000);
                }
            });
        })();

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
