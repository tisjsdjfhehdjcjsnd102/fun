<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Paper.io 2</title>
    <style>
        /* Force the game to fill the entire browser area */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* The actual game frame */
        #game-area {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- This points to the game engine in your 'file/' folder -->
    <iframe 
        id="game-area" 
        src="file/index.html" 
        scrolling="none" 
        frameborder="0" 
        allowfullscreen="true">
    </iframe>

</body>
</html>
