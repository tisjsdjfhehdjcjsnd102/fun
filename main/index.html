<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gelly v2.1.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --nav: #080808; --secondary: #1e1e1e; --accent: #ffffff; --subtext: #777777; }
        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #eeeeee; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #landing { height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px; background: #0b0b0b; position: fixed; z-index: 9999; }
        .secret-wrapper { position: relative; display: flex; align-items: center; height: 42px; }
        #secret-container { display: flex; align-items: center; transition: all 0.4s ease; }
        #secret-container.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
        #secret-input { background: transparent; border: none; color: transparent; font-family: inherit; font-size: 14px; width: 150px; caret-color: transparent; position: absolute; left: 35px; z-index: 2; }
        #dot-display { padding-left: 10px; display: flex; gap: 4px; pointer-events: none; color: var(--subtext); font-weight: 900; font-size: 20px; line-height: 0; margin-top: -2px; }
        .icon-unit { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--subtext); opacity: 0.3; transition: 0.3s; background: none; border: none; cursor: pointer; }
        .icon-unit:hover { opacity: 1; color: var(--accent); }
        #secret-btn { position: absolute; top: 0; left: 0; visibility: hidden; opacity: 0; transform: scale(0.8); }
        #secret-btn.active { visibility: visible; opacity: 0.4; transform: scale(1); }
        #navbar { height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary); display: flex; align-items: center; padding: 0 30px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="landing">
        <div class="secret-wrapper">
            <div id="secret-container">
                <button id="check-btn" class="icon-unit" onclick="handleCheck()">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg>
                </button>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="secret-input" autocomplete="off">
                    <div id="dot-display"></div>
                </div>
            </div>
            <button id="secret-btn" class="icon-unit" onclick="handleTransfer()">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7,2V4H8V18A4,4 0 0,0 12,22A4,4 0 0,0 16,18V4H17V2H7M14,18A2,2 0 0,1 12,20A2,2 0 0,1 10,18V4H14V18Z"/></svg>
            </button>
        </div>
    </div>
    <div id="navbar"><h1>gelly</h1></div>

    <script src="code/cloak.js"></script>
    <script>
        const input = document.getElementById('secret-input');
        const display = document.getElementById('dot-display');

        window.onload = () => input.focus();
        document.getElementById('landing').onclick = () => input.focus();

        input.oninput = () => {
            display.innerText = ".".repeat(input.value.length);
        };

        input.onkeypress = (e) => { if (e.key === 'Enter') handleCheck(); };

        function handleCheck() {
            if (verifyCode(input.value)) {
                document.getElementById('secret-container').classList.add('hidden');
                setTimeout(() => document.getElementById('secret-btn').classList.add('active'), 400);
            } else {
                input.value = "";
                display.innerText = "";
            }
        }

        function handleTransfer() {
            openAboutBlank();
        }

        if (window.location.hash === "#cloaked") {
            document.getElementById('landing').style.display = 'none';
        }
    </script>
</body>
</html>
